<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>카드뉴스 메이커</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<!-- 구글 폰트 -->
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Jua&family=Do+Hyeon&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet"/>
<!-- 눈누 폰트 - 실제 서비스 URL -->
<style>
@font-face{font-family:'TTTteokbokki';src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2111-2@1.0/TTTteokbokki.woff2') format('woff2'),url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2111-2@1.0/TTTteokbokki.woff2') format('woff2');font-weight:normal;font-display:swap}
@font-face{font-family:'MapoBackpacking';src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2307-2@1.0/MapoBackpacking.woff2') format('woff2');font-weight:normal;font-display:swap}
@font-face{font-family:'MapleStory';src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_20-04@2.1/MaplestoryBold.woff') format('woff');font-weight:normal;font-display:swap}
@font-face{font-family:'Jalnan';src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_four@1.2/Jalnan.woff') format('woff');font-weight:normal;font-display:swap}
</style>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f5f3;--sur:#fff;--bdr:#dddbd4;--bdl:#eceae4;--tx:#1a1a1a;--sub:#5f5e5a;--mt:#888780;--ac:#2563eb;--acl:#eff6ff;--r:12px;--rs:8px}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;padding:0 0 80px}
.topbar{background:#fff;border-bottom:1px solid var(--bdr);padding:14px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.back{display:flex;align-items:center;gap:6px;color:var(--sub);font-size:13px;text-decoration:none;padding:6px 10px;border-radius:var(--rs);border:1px solid var(--bdr);background:#fff;cursor:pointer}
.back:hover{background:var(--bg)}
.topbar h1{font-size:16px;font-weight:700;flex:1}
.page{max-width:1120px;margin:0 auto;padding:24px 16px 0;display:grid;grid-template-columns:400px 1fr;gap:20px;align-items:start}
@media(max-width:860px){.page{grid-template-columns:1fr}}
.panel{background:#fff;border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.ph{padding:13px 18px;border-bottom:1px solid var(--bdl);display:flex;align-items:center;gap:8px}
.ph h2{font-size:14px;font-weight:700;flex:1}
.pi{color:var(--ac);font-size:17px}
.pb{padding:16px}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fg label{font-size:11px;font-weight:600;color:var(--sub)}
.fg input,.fg textarea{border:1px solid var(--bdr);border-radius:var(--rs);padding:7px 10px;font-size:13px;font-family:inherit;outline:none;width:100%;background:#fff}
.fg input:focus,.fg textarea:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acl)}
.fg textarea{resize:vertical;min-height:60px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:.15s;font-family:inherit}
.btp{background:var(--ac);color:#fff}.btp:hover{background:#1d4ed8}
.bto{background:#fff;color:var(--sub);border-color:var(--bdr)}.bto:hover{background:var(--bg)}
.btsm{padding:6px 12px;font-size:12px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.sel-btn{padding:8px 6px;border:2px solid var(--bdr);border-radius:var(--rs);background:var(--bg);cursor:pointer;font-size:12px;font-weight:700;color:var(--sub);text-align:center;transition:.15s;font-family:inherit;line-height:1.4}
.sel-btn:hover,.sel-btn.on{border-color:var(--ac);color:var(--ac);background:var(--acl)}
.palette{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.swatch{width:26px;height:26px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:.15s;flex-shrink:0}
.swatch.on{border-color:#111;transform:scale(1.2)}
.dropz{border:2px dashed var(--bdr);border-radius:var(--rs);padding:14px;text-align:center;cursor:pointer;transition:.2s;background:var(--bg)}
.dropz:hover,.dropz.over{border-color:var(--ac);background:var(--acl)}
.dropz i{font-size:22px;color:var(--mt);display:block;margin-bottom:4px}
.dropz p{font-size:12px;color:var(--sub)}
.dropz input{display:none}
.tbl-editor{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}
.tbl-editor th,.tbl-editor td{border:1px solid var(--bdr);padding:0}
.tbl-editor th{background:#f8f8f6}
.tbl-editor input{border:none;padding:5px 7px;font-size:12px;font-family:inherit;outline:none;width:100%;background:transparent}
.preview-wrap{position:sticky;top:72px}
#card-outer{width:100%;aspect-ratio:1/1;position:relative;border-radius:8px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.12)}
#card-canvas{position:absolute;inset:0;overflow:hidden}
.preview-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.notice{padding:8px 12px;background:var(--acl);border:1px solid #bfdbfe;border-radius:var(--rs);font-size:11px;color:var(--ac);margin-bottom:10px}
.size-btns{display:flex;gap:4px}
.size-btn{padding:5px 10px;border:1.5px solid var(--bdr);border-radius:var(--rs);background:#fff;font-size:12px;font-weight:700;cursor:pointer;color:var(--sub);transition:.15s;font-family:inherit}
.size-btn.on{background:var(--ac);color:#fff;border-color:var(--ac)}
</style>
</head>
<body>
<div class="topbar">
  <a href="../" class="back"><i class="ti ti-arrow-left"></i> 돌아가기</a>
  <i class="ti ti-photo" style="font-size:20px;color:var(--ac)"></i>
  <h1>카드뉴스 메이커</h1>
</div>
<div class="page">
  <div>
    <!-- 템플릿 -->
    <div class="panel">
      <div class="ph"><i class="ti ti-layout pi"></i><h2>템플릿</h2></div>
      <div class="pb">
        <div class="grid3">
          <button class="sel-btn on" id="tpl-0">🎉<br>행사 안내</button>
          <button class="sel-btn" id="tpl-1">📚<br>프로그램<br>모집</button>
          <button class="sel-btn" id="tpl-2">📢<br>공지 안내</button>
        </div>
      </div>
    </div>

    <!-- 폰트 -->
    <div class="panel">
      <div class="ph"><i class="ti ti-typography pi"></i><h2>폰트 설정</h2></div>
      <div class="pb">
        <div class="fg" style="margin-bottom:8px"><label>타이틀 폰트</label>
          <div class="grid3" style="margin-top:4px">
            <button class="sel-btn on" id="font-0" style="font-family:'TTTteokbokki','Jua',sans-serif;font-size:11px">한교안심<br>떡볶이체</button>
            <button class="sel-btn" id="font-1" style="font-family:'MapleStory','Do Hyeon',sans-serif;font-size:11px">메이플<br>스토리체</button>
            <button class="sel-btn" id="font-2" style="font-family:'MapoBackpacking','Jua',sans-serif;font-size:11px">마포구<br>배낭여행체</button>
            <button class="sel-btn" id="font-3" style="font-family:'Jalnan','Black Han Sans',sans-serif;font-size:11px">여기어때<br>잘난체</button>
            <button class="sel-btn" id="font-4" style="font-family:'Black Han Sans',sans-serif;font-size:11px">블랙<br>한산스</button>
          </div>
        </div>
        <div class="fg" style="margin-bottom:8px"><label>타이틀 크기</label>
          <div class="size-btns" id="title-size-btns">
            <button class="size-btn" data-v="7">소</button>
            <button class="size-btn" data-v="9">중</button>
            <button class="size-btn on" data-v="12">대</button>
            <button class="size-btn" data-v="15">특대</button>
          </div>
        </div>
        <div class="fg" style="margin-bottom:8px"><label>본문 / 표 크기</label>
          <div class="size-btns" id="body-size-btns">
            <button class="size-btn" data-v="1.6">소</button>
            <button class="size-btn on" data-v="2.0">중</button>
            <button class="size-btn" data-v="2.5">대</button>
          </div>
        </div>
        <div class="fg" style="margin-bottom:8px"><label>글씨 굵기</label>
          <div class="size-btns" id="weight-btns">
            <button class="size-btn" data-v="400">가늘게</button>
            <button class="size-btn on" data-v="700">보통</button>
            <button class="size-btn" data-v="900">굵게</button>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;padding-top:8px;border-top:1px solid var(--bdl)">
          <label style="font-size:12px;font-weight:600;color:var(--sub);display:flex;align-items:center;gap:6px;cursor:pointer">
            <input type="checkbox" id="use-shadow" style="accent-color:var(--ac)"/> 타이틀 그림자 효과
          </label>
        </div>
      </div>
    </div>

    <!-- 배경 색상 -->
    <div class="panel">
      <div class="ph"><i class="ti ti-palette pi"></i><h2>배경 색상</h2></div>
      <div class="pb">
        <div class="palette" id="palette">
          <div class="swatch on" style="background:#fff9f0" data-c="#fff9f0" data-a="#ff6b35"></div>
          <div class="swatch" style="background:#f0f7ff" data-c="#f0f7ff" data-a="#2563eb"></div>
          <div class="swatch" style="background:#f0fff4" data-c="#f0fff4" data-a="#16a34a"></div>
          <div class="swatch" style="background:#fff0f6" data-c="#fff0f6" data-a="#db2777"></div>
          <div class="swatch" style="background:#fffbeb" data-c="#fffbeb" data-a="#d97706"></div>
          <div class="swatch" style="background:#faf0ff" data-c="#faf0ff" data-a="#7c3aed"></div>
          <div class="swatch" style="background:#1a1a2e" data-c="#1a1a2e" data-a="#e94560"></div>
          <div class="swatch" style="background:#fff" data-c="#ffffff" data-a="#2563eb"></div>
          <input type="color" id="custom-color" value="#fff9f0" style="width:26px;height:26px;padding:0;border:2px solid var(--bdr);border-radius:6px;cursor:pointer"/>
        </div>
      </div>
    </div>

    <!-- 배경 사진 -->
    <div class="panel">
      <div class="ph"><i class="ti ti-photo pi"></i><h2>배경 사진 <span style="font-size:11px;font-weight:400;color:var(--mt)">(선택)</span></h2></div>
      <div class="pb">
        <div class="dropz" id="dropz1"><i class="ti ti-cloud-upload"></i><p>사진 드래그 또는 클릭</p><input type="file" id="img1-input" accept="image/*"/></div>
        <div id="img1-ctrl" style="display:none;margin-top:8px">
          <div class="fg"><label>어둡기</label><input type="range" id="overlay-val" min="0" max="85" value="35"/></div>
          <button class="btn bto btsm" id="btn-rm1"><i class="ti ti-x"></i> 제거</button>
        </div>
      </div>
    </div>

    <!-- 메인 이미지 -->
    <div class="panel">
      <div class="ph"><i class="ti ti-photo-up pi"></i><h2>메인 이미지 <span style="font-size:11px;font-weight:400;color:var(--mt)">(여러 장 가능)</span></h2></div>
      <div class="pb">
        <div class="dropz" id="dropz2"><i class="ti ti-image"></i><p>사진 드래그 또는 클릭 (여러 장 선택 가능)</p><input type="file" id="img2-input" accept="image/*" multiple/></div>
        <div id="img2-list" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px"></div>
      </div>
    </div>

    <!-- 텍스트 -->
    <div class="panel">
      <div class="ph"><i class="ti ti-text-size pi"></i><h2>텍스트</h2></div>
      <div class="pb">
        <div class="fg"><label>상단 소제목</label><input id="f-tag" placeholder="예) 4월 청소년일일특강"/></div>
        <div class="fg"><label>메인 타이틀</label><input id="f-title" placeholder="예) 아~락실"/></div>
        <div class="fg"><label>날짜 / 시간</label><textarea id="f-date" rows="2" placeholder="예) 2026.5.16.(토) 13~17시"></textarea></div>
        <div class="fg"><label>장소</label><textarea id="f-place" rows="2" placeholder="예) 노라야재 주차장"></textarea></div>
        <div class="fg"><label>추가 내용</label><textarea id="f-body" placeholder="프로그램 내용, 대상, 안내사항 등"></textarea></div>
        <div class="fg" style="margin-bottom:0"><label>기관명</label><input id="f-org" value="광양시청소년문화센터"/></div>
      </div>
    </div>

    <!-- 표 -->
    <div class="panel">
      <div class="ph"><i class="ti ti-table pi"></i>
        <h2>정보 표 <span style="font-size:11px;font-weight:400;color:var(--mt)">(선택)</span></h2>
        <label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer">
          <input type="checkbox" id="show-table" style="accent-color:var(--ac)"/> 표시
        </label>
      </div>
      <div class="pb">
        <div class="notice">각 셀을 직접 수정하세요</div>
        <table class="tbl-editor" id="info-table">
          <tr><th><input value="대상"/></th><th><input value="날짜 및 시간"/></th><th><input value="장소"/></th><th><input value="모집인원"/></th></tr>
          <tr><td><input value="초1~6"/></td><td><input value="5.16.(토) 13~17시"/></td><td><input value="노라야재"/></td><td><input value="30명"/></td></tr>
          <tr><td colspan="4" style="padding:0"><input value="신청방법: QR코드 스캔 또는 방문 접수 (선착순)" style="width:100%;padding:5px 7px"/></td></tr>
        </table>
        <button class="btn bto btsm" id="btn-add-row" style="margin-top:6px"><i class="ti ti-plus"></i> 행 추가</button>
      </div>
    </div>

    <!-- QR -->
    <div class="panel">
      <div class="ph"><i class="ti ti-qrcode pi"></i>
        <h2>QR코드 <span style="font-size:11px;font-weight:400;color:var(--mt)">(선택)</span></h2>
        <label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer">
          <input type="checkbox" id="show-qr" style="accent-color:var(--ac)"/> 표시
        </label>
      </div>
      <div class="pb">
        <div class="fg"><label>URL</label><input id="f-qr-url" placeholder="https://forms.gle/..."/></div>
        <div class="fg" style="margin-bottom:0"><label>QR 아래 텍스트</label><input id="f-qr-label" placeholder="예) 신청하기"/></div>
      </div>
    </div>
  </div>

  <!-- 프리뷰 -->
  <div class="preview-wrap">
    <div class="panel">
      <div class="ph"><i class="ti ti-eye pi"></i><h2>미리보기</h2><span style="font-size:11px;color:var(--mt)">1080×1080</span></div>
      <div style="padding:16px"><div id="card-outer"><div id="card-canvas"></div></div></div>
    </div>
    <div class="preview-actions">
      <button class="btn btp" id="btn-save"><i class="ti ti-download"></i> PNG 저장</button>
      <button class="btn bto" id="btn-reset"><i class="ti ti-refresh"></i> 초기화</button>
    </div>
  </div>
</div>

<script>
var ST = {
  tpl: 0,
  bgColor: '#fff9f0',
  acColor: '#ff6b35',
  bgImg: null,
  overlay: 35,
  showTable: false,
  showQr: false,
  qrDataUrl: null,
  font: "'TTTteokbokki','Jua',sans-serif",
  titleSize: 12,
  bodySize: 2.0,
  fontWeight: 700,
  shadow: false,
  mainImgs: []
};

function hexBright(h) {
  h = h.replace('#','');
  var r=parseInt(h.slice(0,2),16), g=parseInt(h.slice(2,4),16), b=parseInt(h.slice(4,6),16);
  return (r*299+g*587+b*114)/1000;
}
function contrastText(hex) { return hexBright(hex) > 155 ? '#1a1a1a' : '#ffffff'; }

function generateQR(cb) {
  var url = document.getElementById('f-qr-url').value.trim();
  if (!url || !ST.showQr) { ST.qrDataUrl = null; cb(); return; }
  try {
    // qrcode-generator 라이브러리 동적 로드
    if (window._qrLoaded) {
      _makeQR(url, cb); return;
    }
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js';
    s.onload = function() { window._qrLoaded = true; _makeQR(url, cb); };
    s.onerror = function() { ST.qrDataUrl = null; cb(); };
    document.head.appendChild(s);
  } catch(e) { ST.qrDataUrl = null; cb(); }
}

function _makeQR(url, cb) {
  try {
    var qr = qrcode(0, 'M');
    qr.addData(url);
    qr.make();
    var size = qr.getModuleCount();
    var cell = 6;
    var total = size * cell + 16;
    var cv = document.createElement('canvas');
    cv.width = cv.height = total;
    var ctx = cv.getContext('2d');
    ctx.fillStyle = '#fff';
    ctx.fillRect(0,0,total,total);
    ctx.fillStyle = '#1a1a1a';
    for (var r=0; r<size; r++) {
      for (var c2=0; c2<size; c2++) {
        if (qr.isDark(r,c2)) {
          ctx.fillRect(c2*cell+8, r*cell+8, cell, cell);
        }
      }
    }
    ST.qrDataUrl = cv.toDataURL('image/png');
    cb();
  } catch(e) { ST.qrDataUrl = null; cb(); }
}

function render() {
  var canvas = document.getElementById('card-canvas');
  var W = canvas.offsetWidth;
  if (!W || W < 10) { setTimeout(render, 50); return; }
  function p(pct) { return Math.round(W * pct / 100) + 'px'; }

  var tag   = document.getElementById('f-tag').value.trim();
  var title = document.getElementById('f-title').value.trim() || '제목 입력';
  var date  = document.getElementById('f-date').value.trim();
  var place = document.getElementById('f-place').value.trim();
  var body  = document.getElementById('f-body').value.trim();
  var org   = document.getElementById('f-org').value.trim();
  var qrLbl = document.getElementById('f-qr-label').value.trim() || '신청하기';
  var bg = ST.bgColor, ac = ST.acColor;
  var act = contrastText(ac);
  var mainTx = ST.bgImg ? '#ffffff' : (hexBright(bg) > 155 ? '#1a1a1a' : '#ffffff');
  var subTx  = ST.bgImg ? 'rgba(255,255,255,.88)' : (hexBright(bg) > 155 ? '#444' : 'rgba(255,255,255,.85)');
  var bgStyle = ST.bgImg ? 'background:url(' + ST.bgImg + ') center/cover no-repeat' : 'background:' + bg;
  var overlayHtml = ST.bgImg ? '<div style="position:absolute;inset:0;background:rgba(0,0,0,' + (ST.overlay/100).toFixed(2) + ');z-index:1"></div>' : '';

  var titlePx = p(ST.titleSize);
  var bs = ST.bodySize;
  var shadowStyle = ST.shadow ? 'text-shadow:2px 3px 0 ' + ac + ';' : '';

  // QR
  var qrHtml = '';
  if (ST.showQr && ST.qrDataUrl) {
    qrHtml = '<div style="position:absolute;top:' + p(3) + ';right:' + p(3) + ';z-index:20;text-align:center">'
      + '<div style="background:#fff;padding:' + p(0.8) + ';border-radius:' + p(1) + ';display:inline-block;box-shadow:0 2px 8px rgba(0,0,0,.25)">'
      + '<img src="' + ST.qrDataUrl + '" style="width:' + p(11) + ';display:block"/></div>'
      + '<div style="font-size:' + p(2.2) + ';font-weight:700;color:' + mainTx + ';margin-top:' + p(0.5) + ';text-shadow:0 1px 3px rgba(0,0,0,.4)">' + qrLbl + '</div>'
      + '</div>';
  }

  // 메인 이미지 (여러 장)
  var mainImgHtml = '';
  if (ST.mainImgs.length > 0) {
    if (ST.mainImgs.length === 1) {
      mainImgHtml = '<div style="text-align:center;margin:' + p(1.5) + ' 0"><img src="' + ST.mainImgs[0] + '" style="max-height:' + p(22) + ';max-width:80%;object-fit:contain;border-radius:' + p(1.5) + '"/></div>';
    } else {
      var imgW = Math.floor(88 / ST.mainImgs.length);
      mainImgHtml = '<div style="display:flex;gap:' + p(1) + ';margin:' + p(1.5) + ' 0;justify-content:center;align-items:center">';

        mainImgHtml += '<img src="' + src + '" style="width:' + imgW + '%;max-height:' + p(20) + ';object-fit:cover;border-radius:' + p(1.5) + '"/>';
      });

  // 표
  var tableHtml = '';
  if (ST.showTable) {
    var rows = document.getElementById('info-table').querySelectorAll('tr');
    tableHtml = '<table style="width:100%;border-collapse:collapse;font-size:' + p(bs) + ';margin-top:' + p(1.5) + '">';
    rows.forEach(function(tr) {

      tr.querySelectorAll('th,td').forEach(function(cell) {

        tableHtml += '<' + (isH?'th':'td') + cs
          + ' style="border:1.5px solid ' + ac + ';padding:' + p(0.9) + ' ' + p(1.2) + ';'
          + (isH ? 'background:' + ac + ';color:' + act + ';font-weight:700;text-align:center'

          + '">' + val + '</' + (isH?'th':'td') + '>';
      });
      tableHtml += '</tr>';
    });
    tableHtml += '</table>';
  }

  var pad = p(5) + ' ' + p(6);
  var html = '';

  // ── 행사 안내형
  if (ST.tpl === 0) {
    html = '<div style="position:absolute;inset:0;' + bgStyle + '"></div>' + overlayHtml + qrHtml
      + '<div style="position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;padding:' + pad + '">'
        + (tag ? '<div style="align-self:center;background:' + ac + ';color:' + act + ';font-size:' + p(bs*1.4) + ';font-weight:900;padding:' + p(0.5) + ' ' + p(2) + ';border-radius:' + p(3) + ';margin-bottom:' + p(1.5) + '">' + tag + '</div>' : '')
        + '<div style="font-family:' + ST.font + ';font-size:' + titlePx + ';color:' + mainTx + ';text-align:center;line-height:1.15;margin-bottom:' + p(1.5) + ';word-break:keep-all;' + shadowStyle + '">' + title + '</div>'
        + (date  ? '<div style="font-size:' + p(bs*1.5) + ';font-weight:900;color:' + ac + ';text-align:center;margin-bottom:' + p(0.6) + '">' + date + '</div>' : '')
        + (place ? '<div style="font-size:' + p(bs*1.2) + ';font-weight:700;color:' + subTx + ';text-align:center;margin-bottom:' + p(1.5) + '">' + place + '</div>' : '')
        + mainImgHtml
        + (body  ? '<div style="font-size:' + p(bs) + ';color:' + subTx + ';line-height:1.7;white-space:pre-wrap;font-weight:' + ST.fontWeight + ';margin-bottom:' + p(1.5) + '">' + body + '</div>' : '')
        + tableHtml
        + '<div style="margin-top:auto;border-top:2px solid ' + ac + ';padding-top:' + p(1.8) + ';display:flex;justify-content:space-between;align-items:center">'
          + '<div style="font-size:' + p(bs*1.1) + ';font-weight:900;color:' + mainTx + '">' + org + '</div>'
          + '<div style="font-size:' + p(bs*0.85) + ';color:' + subTx + '">광양시 광장로14 ☎794-2230</div>'
        + '</div>'
      + '</div>';

  // ── 프로그램 모집형
  } else if (ST.tpl === 1) {
    html = '<div style="position:absolute;inset:0;' + bgStyle + '"></div>' + overlayHtml + qrHtml
      + '<div style="position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;padding:' + pad + '">'
        + (tag ? '<div style="display:inline-block;background:' + ac + ';color:' + act + ';font-size:' + p(bs*1.4) + ';font-weight:900;padding:' + p(0.5) + ' ' + p(1.8) + ';border-radius:' + p(3) + ';margin-bottom:' + p(1.5) + '">' + tag + '</div>' : '')
        + '<div style="font-family:' + ST.font + ';font-size:' + titlePx + ';color:' + mainTx + ';line-height:1.15;margin-bottom:' + p(1.2) + ';word-break:keep-all;' + shadowStyle + '">' + title + '</div>'
        + (date  ? '<div style="font-size:' + p(bs*1.5) + ';font-weight:900;color:' + ac + ';margin-bottom:' + p(0.5) + '">' + date + '</div>' : '')
        + (place ? '<div style="font-size:' + p(bs*1.2) + ';color:' + subTx + ';margin-bottom:' + p(1.5) + '">' + place + '</div>' : '')
        + mainImgHtml
        + (body  ? '<div style="font-size:' + p(bs) + ';color:' + subTx + ';line-height:1.7;white-space:pre-wrap;font-weight:' + ST.fontWeight + ';margin-bottom:' + p(1.5) + '">' + body + '</div>' : '')
        + tableHtml
        + '<div style="margin-top:auto;border-top:2px solid ' + ac + ';padding-top:' + p(1.8) + ';display:flex;justify-content:space-between;align-items:center">'
          + '<div style="font-size:' + p(bs*1.1) + ';font-weight:900;color:' + mainTx + '">' + org + '</div>'
          + '<div style="font-size:' + p(bs*0.85) + ';color:' + subTx + '">광양시 광장로14 ☎794-2230</div>'
        + '</div>'
      + '</div>';

  // ── 공지 안내형
  } else {
    html = '<div style="position:absolute;inset:0;' + bgStyle + '"></div>' + overlayHtml + qrHtml
      + '<div style="position:absolute;top:0;left:0;right:0;height:' + p(20) + ';background:' + ac + ';z-index:10;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:' + p(2) + ' ' + p(5) + '">'
        + (tag ? '<div style="font-size:' + p(bs*1.2) + ';font-weight:700;color:rgba(255,255,255,.8);letter-spacing:.08em;margin-bottom:' + p(0.8) + '">' + tag + '</div>' : '')
        + '<div style="font-family:' + ST.font + ';font-size:' + titlePx + ';color:#fff;text-align:center;line-height:1.1;word-break:keep-all;' + (ST.shadow ? 'text-shadow:2px 2px 0 rgba(0,0,0,.3)' : '') + '">' + title + '</div>'
      + '</div>'
      + '<div style="position:absolute;top:' + p(20) + ';left:0;right:0;bottom:0;z-index:10;display:flex;flex-direction:column;padding:' + p(4) + ' ' + p(6) + '">'
        + (date  ? '<div style="font-size:' + p(bs*1.5) + ';font-weight:900;color:' + ac + ';margin-bottom:' + p(0.6) + '">' + date + '</div>' : '')
        + (place ? '<div style="font-size:' + p(bs*1.2) + ';color:' + subTx + ';margin-bottom:' + p(1.5) + '">' + place + '</div>' : '')
        + mainImgHtml
        + (body  ? '<div style="font-size:' + p(bs) + ';color:' + subTx + ';line-height:1.7;white-space:pre-wrap;font-weight:' + ST.fontWeight + ';margin-bottom:' + p(1.5) + '">' + body + '</div>' : '')
        + tableHtml
        + '<div style="margin-top:auto;border-top:2px solid ' + ac + ';padding-top:' + p(1.8) + ';display:flex;justify-content:space-between;align-items:center">'
          + '<div style="font-size:' + p(bs*1.1) + ';font-weight:900;color:' + mainTx + '">' + org + '</div>'
          + '<div style="font-size:' + p(bs*0.85) + ';color:' + subTx + '">광양시 광장로14 ☎794-2230</div>'
        + '</div>'
      + '</div>';
  }

  canvas.innerHTML = html;
}

function renderAfterQR() { generateQR(render); }

];

// 타이틀 크기
document.getElementById('title-size-btns').querySelectorAll('.size-btn').forEach(function(btn) {

document.getElementById('body-size-btns').querySelectorAll('.size-btn').forEach(function(btn) {

document.getElementById('weight-btns').querySelectorAll('.size-btn').forEach(function(btn) {

// 그림자
document.getElementById('use-shadow').addEventListener('change', function() { ST.shadow = this.checked; render(); });

swatches.forEach(function(sw) {
  sw.addEventListener('click', function() {
    swatches.forEach(function(x) { x.classList.remove('on'); });

// 이미지 드롭
function setupDrop(dzId, inputId, ctrlId, rmId, stateKey) {
  var dz = document.getElementById(dzId), inp = document.getElementById(inputId);
  dz.addEventListener('click', function() { inp.click(); });
  dz.addEventListener('dragover', function(e) { e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', function() { dz.classList.remove('over'); });
  dz.addEventListener('drop', function(e) { e.preventDefault(); dz.classList.remove('over'); if(e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0], stateKey, ctrlId); });
  inp.addEventListener('change', function() { if(this.files[0]) loadFile(this.files[0], stateKey, ctrlId); });
  document.getElementById(rmId).addEventListener('click', function() {
    ST[stateKey] = null; document.getElementById(ctrlId).style.display = 'none'; inp.value = ''; render();
  });
}
function loadFile(file, key, ctrlId) {
  var rd = new FileReader();
  rd.onload = function(e) { ST[key] = e.target.result; document.getElementById(ctrlId).style.display = ''; render(); };
  rd.readAsDataURL(file);
}
setupDrop('dropz1','img1-input','img1-ctrl','btn-rm1','bgImg');
// 메인 이미지 다중 처리
var dz2 = document.getElementById('dropz2');
var inp2 = document.getElementById('img2-input');
dz2.addEventListener('click', function() { inp2.click(); });
dz2.addEventListener('dragover', function(e) { e.preventDefault(); dz2.classList.add('over'); });
dz2.addEventListener('dragleave', function() { dz2.classList.remove('over'); });
dz2.addEventListener('drop', function(e) { e.preventDefault(); dz2.classList.remove('over'); loadMultiImg(e.dataTransfer.files); });
inp2.addEventListener('change', function() { loadMultiImg(this.files); });

function loadMultiImg(files) {
  var arr = Array.from(files);
  var loaded = 0;
  arr.forEach(function(file) {
    var rd = new FileReader();
    rd.onload = function(e) {
      ST.mainImgs.push(e.target.result);
      loaded++;
      if (loaded === arr.length) { renderImgList(); render(); }
    };
    rd.readAsDataURL(file);
  });
}

function renderImgList() {
  var list = document.getElementById('img2-list');
  if (!ST.mainImgs.length) { list.innerHTML = ''; return; }
  list.innerHTML = ST.mainImgs.map(function(src, i) {
    return '<div style="position:relative;display:inline-block">'
      + '<img src="' + src + '" style="width:60px;height:60px;object-fit:cover;border-radius:6px;border:1px solid var(--bdr)"/>'
      + '<button onclick="removeImg(' + i + ')" style="position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;background:var(--rd);color:#fff;border:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;padding:0">×</button>'
      + '</div>';
  }).join('');
}

function removeImg(idx) {
  ST.mainImgs.splice(idx, 1);
  renderImgList();
  render();
}
document.getElementById('overlay-val').addEventListener('input', function() { ST.overlay = parseInt(this.value); render(); });

// QR
document.getElementById('show-qr').addEventListener('change', function() { ST.showQr = this.checked; renderAfterQR(); });
document.getElementById('f-qr-url').addEventListener('input', function() { if (ST.showQr) renderAfterQR(); else render(); });

// 표
document.getElementById('show-table').addEventListener('change', function() { ST.showTable = this.checked; render(); });
document.getElementById('info-table').addEventListener('input', function() { if(ST.showTable) render(); });
document.getElementById('btn-add-row').addEventListener('click', function() {
  var tbl = document.getElementById('info-table');
  var tr = document.createElement('tr');
  for (var i = 0; i < 4; i++) {
    var td = document.createElement('td'), inp = document.createElement('input');
    inp.addEventListener('input', render); td.appendChild(inp); tr.appendChild(td);
  }
  tbl.appendChild(tr); render();
});

// 텍스트
['f-tag','f-title','f-date','f-place','f-body','f-org','f-qr-label'].forEach(function(id) {
  document.getElementById(id).addEventListener('input', render);
});

// 저장
document.getElementById('btn-save').addEventListener('click', function() {
  html2canvas(document.getElementById('card-canvas'), {scale:3, useCORS:true, allowTaint:true, backgroundColor:null})
    .then(function(c) {
      var a = document.createElement('a');
      a.download = 'cardnews_' + Date.now() + '.png';
      a.href = c.toDataURL('image/png'); a.click();
    });
});

// 초기화
document.getElementById('btn-reset').addEventListener('click', function() {
  ['f-tag','f-title','f-date','f-place','f-body','f-qr-url','f-qr-label'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('f-org').value = '광양시청소년문화센터';
  ST.bgImg = null; ST.mainImg = null; ST.qrDataUrl = null;
  ST.showQr = false; ST.showTable = false; ST.shadow = false;
  document.getElementById('img1-ctrl').style.display = 'none';
  ST.mainImgs = []; renderImgList();
  document.getElementById('show-qr').checked = false;
  document.getElementById('show-table').checked = false;
  document.getElementById('use-shadow').checked = false;
  render();
});

window.addEventListener('resize', render);
render();
