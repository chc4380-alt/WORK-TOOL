<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>할일 목록</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.6.0/dist/tabler-icons.min.css" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:20px 12px 60px}
:root{
  --accent:#1D9E75;--accent-bg:#E1F5EE;--accent-dark:#0F6E56;
  --blue:#185FA5;--blue-bg:#E6F1FB;
  --bg:#fff;--bg2:#f5f5f3;--bg3:#eeece6;
  --border:#d4d2c9;--border2:#c0bdb3;
  --text:#1a1a1a;--text2:#5f5e5a;--text3:#888780;
  --r:8px;--rl:12px;
  --red-bg:#FCEBEB;--red:#A32D2D;--red-bd:#F7C1C1;
  --amber-bg:#FAEEDA;--amber:#854F0B;
}
.app{display:grid;grid-template-columns:192px 1fr;min-height:660px;width:100%;max-width:900px;background:var(--bg);border-radius:var(--rl);border:0.5px solid var(--border);box-shadow:0 2px 12px rgba(0,0,0,.07);overflow:hidden}
.sidebar{border-right:0.5px solid var(--border);padding:14px 10px;display:flex;flex-direction:column;gap:2px;background:var(--bg2)}
.logo{display:flex;align-items:center;gap:8px;padding:6px 10px 16px;border-bottom:0.5px solid var(--border);margin-bottom:6px}
.logo i{font-size:18px;color:var(--accent)}
.logo span{font-size:13px;font-weight:600;color:var(--text)}
.nav{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--text2);transition:background .15s;user-select:none}
.nav:hover{background:var(--bg3)}
.nav.active{background:var(--bg);color:var(--text);font-weight:500;box-shadow:0 0 0 0.5px var(--border)}
.nav i{font-size:15px;flex-shrink:0}
.nbadge{margin-left:auto;font-size:11px;font-weight:600;padding:1px 7px;border-radius:20px;background:var(--accent-bg);color:var(--accent-dark)}
.nbadge.b{background:var(--blue-bg);color:var(--blue)}
.sfooter{margin-top:auto;padding:10px 8px;font-size:10px;color:var(--text3);line-height:1.6;border-top:0.5px solid var(--border);text-align:center}
.main{display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;gap:10px;padding:13px 18px;border-bottom:0.5px solid var(--border);flex-shrink:0}
.topbar h1{font-size:14px;font-weight:600;flex:1}
.today-badge{font-size:11px;color:var(--text3);background:var(--bg2);padding:3px 10px;border-radius:20px;border:0.5px solid var(--border);white-space:nowrap}
.btn-add{display:flex;align-items:center;gap:5px;padding:6px 13px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap}
.btn-add:hover{opacity:.85}
.content{flex:1;padding:14px 18px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;max-height:calc(100vh - 100px)}
.content::-webkit-scrollbar{width:3px}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat{background:var(--bg2);border-radius:var(--r);padding:10px 12px;border:0.5px solid var(--border)}
.stat-n{font-size:22px;font-weight:600;line-height:1}
.stat-l{font-size:11px;color:var(--text2);margin-top:3px}
.date-group{display:flex;flex-direction:column;gap:6px}
.date-header{display:flex;align-items:center;gap:8px;padding:2px 0}
.date-label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.04em}
.date-line{flex:1;height:0.5px;background:var(--border)}
.date-count{font-size:11px;color:var(--text3)}
.card{background:var(--bg);border:0.5px solid var(--border);border-left:3px solid var(--border);border-radius:var(--r);padding:11px 13px;display:flex;flex-direction:column;gap:7px;transition:box-shadow .15s}
.card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card.ph{border-left-color:#E24B4A}
.card.pm{border-left-color:#EF9F27}
.card.pl{border-left-color:var(--accent)}
.card-top{display:flex;align-items:flex-start;gap:9px}
.checks{display:flex;flex-direction:column;gap:4px;flex-shrink:0;padding-top:2px}
.cw{display:flex;align-items:center;gap:4px}
.cb{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--bg);transition:all .15s}
.cb:hover{border-color:var(--accent)}
.cb.cd{background:var(--accent);border-color:var(--accent);color:#fff}
.cb.ca{background:var(--blue);border-color:var(--blue);color:#fff}
.cb i{font-size:9px}
.cl{font-size:10px;color:var(--text3)}
.cbody{flex:1;min-width:0}
.ctitle{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;cursor:pointer}
.ctitle:hover{color:var(--accent)}
.cmeta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:4px}
.mi{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--text2)}
.mi i{font-size:12px}
.pp{font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px}
.pp.h{background:var(--red-bg);color:var(--red)}
.pp.m{background:var(--amber-bg);color:var(--amber)}
.pp.l{background:var(--accent-bg);color:var(--accent-dark)}
.overdue{color:#E24B4A;font-weight:500}
.duetoday{color:var(--amber);font-weight:500}
.cremark{font-size:11px;color:var(--text2);background:var(--bg2);border-radius:5px;padding:6px 9px;line-height:1.55;border-left:2px solid var(--border2)}
.btn-edit{background:none;border:0.5px solid var(--border);border-radius:6px;padding:4px 7px;cursor:pointer;font-size:11px;color:var(--text3);display:flex;align-items:center;transition:background .15s}
.btn-edit:hover{background:var(--bg2)}
.stamp{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--blue);background:var(--blue-bg);border-radius:5px;padding:3px 9px;margin-top:3px}
.empty{text-align:center;padding:48px 20px;color:var(--text3);font-size:13px;line-height:2}
.empty i{font-size:30px;display:block;margin-bottom:8px}
.memo-area{display:flex;flex-direction:column;gap:8px}
.memo-toolbar{display:flex;align-items:center;justify-content:space-between}
.memo-info{font-size:11px;color:var(--text3)}
.btn-memo-save{padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer}
.btn-memo-save:hover{opacity:.85}
.memo-pad{width:100%;min-height:460px;padding:14px;border-radius:var(--r);border:0.5px solid var(--border);background:var(--bg2);color:var(--text);font-size:13px;line-height:1.8;resize:vertical;font-family:inherit}
.memo-pad:focus{outline:none;border-color:var(--accent)}
.memo-saved{font-size:11px;color:var(--accent)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:200;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--bg);border-radius:var(--rl);border:0.5px solid var(--border);padding:22px;width:420px;max-width:calc(100vw - 24px);display:flex;flex-direction:column;gap:13px;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal h2{font-size:14px;font-weight:600}
.field label{font-size:11px;color:var(--text2);font-weight:500;display:block;margin-bottom:4px}
.field input,.field textarea,.field select{width:100%;font-size:13px;padding:7px 10px;border-radius:var(--r);border:0.5px solid var(--border);background:var(--bg2);color:var(--text);font-family:inherit}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--accent)}
.field textarea{resize:vertical;min-height:68px;line-height:1.6}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ckrow{display:flex;align-items:center;gap:7px;cursor:pointer}
.ckrow input{width:15px;height:15px;cursor:pointer;accent-color:var(--accent)}
.ckrow label{font-size:13px;color:var(--text);cursor:pointer}
.mfooter{display:flex;gap:8px;justify-content:flex-end;padding-top:4px;border-top:0.5px solid var(--border)}
.btn-c{padding:7px 14px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);font-size:12px;cursor:pointer;color:var(--text);font-family:inherit}
.btn-s{padding:7px 14px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-del{padding:7px 13px;background:var(--red-bg);color:var(--red);border:0.5px solid var(--red-bd);border-radius:var(--r);font-size:12px;cursor:pointer;margin-right:auto;display:flex;align-items:center;gap:4px;font-family:inherit}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo"><i class="ti ti-briefcase"></i><span>할일 목록</span></div>
    <div class="nav active" id="nav-todo" onclick="sv('todo')"><i class="ti ti-list-check"></i>할일<span class="nbadge" id="b-todo">0</span></div>
    <div class="nav" id="nav-done" onclick="sv('done')"><i class="ti ti-circle-check"></i>할일완료<span class="nbadge b" id="b-done">0</span></div>
    <div class="nav" id="nav-memo" onclick="sv('memo')"><i class="ti ti-pencil"></i>메모장</div>
    <div class="sfooter">완료 + 결재 모두 체크 시<br>할일완료로 자동 이동</div>
  </aside>
  <main class="main">
    <div class="topbar">
      <h1 id="vtitle">할일</h1>
      <span class="today-badge" id="today"></span>
      <button class="btn-add" id="btn-add" onclick="openModal()"><i class="ti ti-plus" style="font-size:13px"></i> 추가</button>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<div class="overlay" id="modal" onclick="oclose(event)">
  <div class="modal">
    <h2 id="mtitle">새 할일 추가</h2>
    <div class="field"><label>제목 *</label><input id="f-title" placeholder="업무 내용 입력" /></div>
    <div class="r2">
      <div class="field"><label>우선순위</label>
        <select id="f-pri"><option value="h">🔴 높음 (긴급)</option><option value="m" selected>🟡 보통</option><option value="l">🟢 낮음</option></select>
      </div>
      <div class="field"><label>마감일</label><input type="date" id="f-due" /></div>
    </div>
    <div class="field"><label>담당자</label><input id="f-person" placeholder="이름" /></div>
    <div class="field"><label>비고</label><textarea id="f-rem" placeholder="참고사항 등..."></textarea></div>
    <div class="r2">
      <div class="ckrow"><input type="checkbox" id="f-done" /><label for="f-done">완료</label></div>
      <div class="ckrow"><input type="checkbox" id="f-appr" /><label for="f-appr">결재</label></div>
    </div>
    <div class="mfooter">
      <button class="btn-del" id="btn-del" onclick="delItem()" style="display:none"><i class="ti ti-trash" style="font-size:12px"></i>삭제</button>
      <button class="btn-c" onclick="closeModal()">취소</button>
      <button class="btn-s" onclick="save()">저장</button>
    </div>
  </div>
</div>

<script>
const todayStr=()=>new Date().toISOString().slice(0,10);
const nowStr=()=>{const d=new Date();return d.toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'})+' '+d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});};
const fmtDate=s=>{if(!s)return'';const[y,m,d]=s.split('-');return`${y}.${m}.${d}`;};

let tasks=[], nid=1, view='todo', eid=null;
let memo='', memoSavedAt='';

document.getElementById('today').textContent=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});

function sv(v){
  view=v;
  ['todo','done','memo'].forEach(k=>document.getElementById('nav-'+k)?.classList.toggle('active',k===v));
  document.getElementById('vtitle').textContent={todo:'할일',done:'할일완료',memo:'메모장'}[v];
  const ab=document.getElementById('btn-add');
  if(v==='memo'||v==='done'){ab.style.display='none';}
  else{ab.style.display='flex';ab.onclick=openModal;}
  render();
}

function render(){
  ubadge();
  const el=document.getElementById('content');
  if(view==='todo') rTodo(el);
  else if(view==='done') rDone(el);
  else rMemo(el);
}

function ubadge(){
  document.getElementById('b-todo').textContent=tasks.filter(t=>!full(t)).length;
  document.getElementById('b-done').textContent=tasks.filter(t=>full(t)).length;
}

const full=t=>t.done&&t.appr;

function groupByDate(list){
  const g={};
  list.forEach(t=>{const d=t.date||'기타';if(!g[d])g[d]=[];g[d].push(t);});
  return g;
}

function rTodo(el){
  const today=todayStr();
  const list=tasks.filter(t=>!full(t)).sort((a,b)=>{
    const po={h:0,m:1,l:2};
    if(po[a.pri]!==po[b.pri]) return po[a.pri]-po[b.pri];
    return (a.due||'9999').localeCompare(b.due||'9999');
  });
  const g=groupByDate(list);
  const dates=Object.keys(g).sort((a,b)=>b.localeCompare(a));
  const urgent=list.filter(t=>t.pri==='h').length;
  const overdue=list.filter(t=>t.due&&t.due<today).length;

  let html=`<div class="stats">
    <div class="stat"><div class="stat-n">${list.length}</div><div class="stat-l">진행중</div></div>
    <div class="stat"><div class="stat-n">${urgent}</div><div class="stat-l">🔴 긴급</div></div>
    <div class="stat"><div class="stat-n">${overdue}</div><div class="stat-l">⏰ 마감 도래</div></div>
  </div>`;

  if(list.length===0){
    html+='<div class="empty"><i class="ti ti-mood-smile"></i>모든 할일이 완료되었습니다!</div>';
  } else {
    dates.forEach(d=>{
      const isToday=d===today;
      html+=`<div class="date-group">
        <div class="date-header">
          <span class="date-label">${isToday?'오늘 · '+fmtDate(d):fmtDate(d)}</span>
          <div class="date-line"></div>
          <span class="date-count">${g[d].length}건</span>
        </div>
        ${g[d].map(t=>cardHTML(t,today)).join('')}
      </div>`;
    });
  }
  el.innerHTML=html;
}

function rDone(el){
  const list=tasks.filter(t=>full(t)).sort((a,b)=>(b.completedAt||'').localeCompare(a.completedAt||''));
  const g=groupByDate(list);
  const dates=Object.keys(g).sort((a,b)=>b.localeCompare(a));

  let html=`<div class="stats">
    <div class="stat"><div class="stat-n">${list.length}</div><div class="stat-l">완료 건수</div></div>
    <div class="stat"><div class="stat-n">${list.filter(t=>t.pri==='h').length}</div><div class="stat-l">긴급 완료</div></div>
    <div class="stat"><div class="stat-n">${[...new Set(list.map(t=>t.date))].length}</div><div class="stat-l">완료 일수</div></div>
  </div>`;

  if(list.length===0){
    html+='<div class="empty"><i class="ti ti-check-circle"></i>완료된 항목이 없습니다</div>';
  } else {
    dates.forEach(d=>{
      html+=`<div class="date-group">
        <div class="date-header">
          <span class="date-label">${fmtDate(d)}</span>
          <div class="date-line"></div>
          <span class="date-count">${g[d].length}건</span>
        </div>
        ${g[d].map(t=>`
        <div class="card" style="border-left-color:var(--blue);opacity:.85">
          <div class="card-top">
            <div class="checks">
              <div class="cw"><div class="cb cd" onclick="tDone(${t.id})"><i class="ti ti-check"></i></div><span class="cl">완료</span></div>
              <div class="cw"><div class="cb ca" onclick="tAppr(${t.id})"><i class="ti ti-check"></i></div><span class="cl">결재</span></div>
            </div>
            <div class="cbody">
              <div class="ctitle" style="text-decoration:line-through;color:var(--text3);cursor:default">${t.title}</div>
              <div class="cmeta">
                ${t.due?`<span class="mi"><i class="ti ti-calendar"></i>${fmtDate(t.due)}</span>`:''}
                ${t.person?`<span class="mi"><i class="ti ti-user"></i>${t.person}</span>`:''}
              </div>
              ${t.completedAt?`<div class="stamp"><i class="ti ti-clock" style="font-size:11px"></i>완료: ${t.completedAt}</div>`:''}
            </div>
          </div>
          ${t.rem?`<div class="cremark">${t.rem}</div>`:''}
        </div>`).join('')}
      </div>`;
    });
  }
  el.innerHTML=html;
}

function cardHTML(t,today){
  const ov=t.due&&t.due<today,dt=t.due&&t.due===today;
  return `<div class="card p${t.pri}">
    <div class="card-top">
      <div class="checks">
        <div class="cw"><div class="cb${t.done?' cd':''}" onclick="tDone(${t.id})">${t.done?'<i class="ti ti-check"></i>':''}</div><span class="cl">완료</span></div>
        <div class="cw"><div class="cb${t.appr?' ca':''}" onclick="tAppr(${t.id})">${t.appr?'<i class="ti ti-check"></i>':''}</div><span class="cl">결재</span></div>
      </div>
      <div class="cbody">
        <div class="ctitle" onclick="edit(${t.id})">${t.title}</div>
        <div class="cmeta">
          <span class="pp ${t.pri}">${t.pri==='h'?'긴급':t.pri==='m'?'보통':'낮음'}</span>
          ${t.due?`<span class="mi ${ov?'overdue':dt?'duetoday':''}"><i class="ti ti-calendar"></i>${ov?'⚠ 기한초과 ':dt?'오늘 마감 ':''}${fmtDate(t.due)}</span>`:''}
          ${t.person?`<span class="mi"><i class="ti ti-user"></i>${t.person}</span>`:''}
        </div>
      </div>
      <button class="btn-edit" onclick="edit(${t.id})"><i class="ti ti-edit" style="font-size:13px"></i></button>
    </div>
    ${t.rem?`<div class="cremark">${t.rem}</div>`:''}
  </div>`;
}

function rMemo(el){
  el.innerHTML=`<div class="memo-area">
    <div class="memo-toolbar">
      <span class="memo-info">자유롭게 메모를 입력하세요</span>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="memo-saved" id="memo-saved" style="display:none;font-size:11px;color:var(--accent)">저장됨 ✓</span>
        <button class="btn-memo-save" onclick="saveMemo()">저장</button>
      </div>
    </div>
    <textarea class="memo-pad" id="memo-pad" placeholder="여기에 자유롭게 메모를 입력하세요...">${memo}</textarea>
    ${memoSavedAt?`<div style="font-size:11px;color:var(--text3)">마지막 저장: ${memoSavedAt}</div>`:''}
  </div>`;
}

function saveMemo(){
  memo=document.getElementById('memo-pad')?.value||'';
  memoSavedAt=nowStr();
  const s=document.getElementById('memo-saved');
  if(s){s.style.display='inline';setTimeout(()=>{if(s)s.style.display='none';},2000);}
  const ts=document.querySelector('.memo-area>div:last-child');
  if(ts&&ts.style){/* handled by re-render below */}
  render();
}

function tDone(id){const t=tasks.find(x=>x.id===id);if(!t)return;t.done=!t.done;chk(t);render();}
function tAppr(id){const t=tasks.find(x=>x.id===id);if(!t)return;t.appr=!t.appr;chk(t);render();}
function chk(t){
  if(t.done&&t.appr&&!t.completedAt){t.completedAt=nowStr();}
  else if(!t.done||!t.appr){t.completedAt=null;}
}

function openModal(){
  eid=null;
  document.getElementById('mtitle').textContent='새 할일 추가';
  document.getElementById('f-title').value='';
  document.getElementById('f-pri').value='m';
  document.getElementById('f-due').value='';
  document.getElementById('f-person').value='';
  document.getElementById('f-rem').value='';
  document.getElementById('f-done').checked=false;
  document.getElementById('f-appr').checked=false;
  document.getElementById('btn-del').style.display='none';
  document.getElementById('modal').classList.add('open');
}
function edit(id){
  eid=id;
  const t=tasks.find(x=>x.id===id);
  document.getElementById('mtitle').textContent='항목 수정';
  document.getElementById('f-title').value=t.title;
  document.getElementById('f-pri').value=t.pri;
  document.getElementById('f-due').value=t.due||'';
  document.getElementById('f-person').value=t.person||'';
  document.getElementById('f-rem').value=t.rem||'';
  document.getElementById('f-done').checked=t.done;
  document.getElementById('f-appr').checked=t.appr;
  document.getElementById('btn-del').style.display='flex';
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');eid=null;}
function oclose(e){if(e.target.id==='modal')closeModal();}

function save(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){alert('제목을 입력해주세요');return;}
  const data={
    title,
    pri:document.getElementById('f-pri').value,
    due:document.getElementById('f-due').value,
    person:document.getElementById('f-person').value.trim(),
    rem:document.getElementById('f-rem').value.trim(),
    done:document.getElementById('f-done').checked,
    appr:document.getElementById('f-appr').checked
  };
  if(eid){
    const i=tasks.findIndex(t=>t.id===eid);
    tasks[i]={...tasks[i],...data};chk(tasks[i]);
  } else {
    const t={id:nid++,...data,date:todayStr(),completedAt:null};chk(t);tasks.push(t);
  }
  closeModal();render();
}
function delItem(){
  if(!eid)return;
  if(!confirm('삭제할까요?'))return;
  tasks=tasks.filter(t=>t.id!==eid);
  closeModal();render();
}

render();
</script>
