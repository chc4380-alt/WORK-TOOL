<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>할일 목록 & 메모장</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.6.0/dist/tabler-icons.min.css" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px}

:root{
  --accent:#1D9E75;--accent-bg:#E1F5EE;--accent-dark:#0F6E56;
  --blue:#185FA5;--blue-bg:#E6F1FB;
  --bg:#ffffff;--bg2:#f5f5f3;--bg3:#eeece6;
  --border:#d4d2c9;--border2:#c0bdb3;
  --text:#1a1a1a;--text2:#5f5e5a;--text3:#888780;
  --radius:8px;--radius-lg:12px;
  --red-bg:#FCEBEB;--red:#A32D2D;--red-border:#F7C1C1;
  --amber-bg:#FAEEDA;--amber:#854F0B;
  --shadow:0 2px 8px rgba(0,0,0,.08);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a;--bg2:#242422;--bg3:#2c2c2a;
    --border:#3a3a38;--border2:#4a4a48;
    --text:#e8e6df;--text2:#a0a09a;--text3:#666660;
    --red-bg:#2d1a1a;--red:#f09595;--red-border:#502020;
    --amber-bg:#2d2410;--amber:#EF9F27;
    --accent-bg:#0d2e22;--accent-dark:#5DCAA5;
    --blue-bg:#0d1e35;
  }
}

.app{display:grid;grid-template-columns:210px 1fr;min-height:680px;width:100%;max-width:960px;background:var(--bg);border-radius:var(--radius-lg);border:0.5px solid var(--border);box-shadow:var(--shadow);overflow:hidden}

/* ── 사이드바 ── */
.sidebar{border-right:0.5px solid var(--border);padding:16px 10px;display:flex;flex-direction:column;gap:3px;background:var(--bg2)}
.app-logo{display:flex;align-items:center;gap:8px;padding:8px 10px 14px;border-bottom:0.5px solid var(--border);margin-bottom:6px}
.app-logo i{font-size:20px;color:var(--accent)}
.app-logo span{font-size:14px;font-weight:600;color:var(--text)}
.sidebar-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;padding:10px 10px 4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--text2);transition:background .15s,color .15s;user-select:none}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--bg);color:var(--text);font-weight:500;box-shadow:0 0 0 0.5px var(--border)}
.nav-item i{font-size:16px;flex-shrink:0}
.badge{margin-left:auto;font-size:11px;font-weight:600;padding:1px 7px;border-radius:20px;line-height:1.6}
.badge-todo{background:var(--accent-bg);color:var(--accent-dark)}
.badge-done{background:var(--blue-bg);color:var(--blue)}
.sidebar-footer{margin-top:auto;padding:10px;font-size:10px;color:var(--text3);line-height:1.6;text-align:center;border-top:0.5px solid var(--border)}

/* ── 메인 ── */
.main{display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:0.5px solid var(--border);flex-shrink:0}
.topbar h1{font-size:15px;font-weight:600;flex:1;color:var(--text)}
.date-badge{font-size:12px;color:var(--text2);background:var(--bg2);padding:4px 10px;border-radius:20px;border:0.5px solid var(--border);white-space:nowrap}
.btn-add{display:flex;align-items:center;gap:5px;padding:7px 14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.btn-add:hover{opacity:.85}

.content{flex:1;padding:16px 20px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;max-height:calc(100vh - 130px)}

.section-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;padding-top:4px}

/* ── 통계 요약 ── */
.summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat{background:var(--bg2);border-radius:var(--radius);padding:10px 14px;border:0.5px solid var(--border)}
.stat-n{font-size:24px;font-weight:600;color:var(--text);line-height:1}
.stat-l{font-size:11px;color:var(--text2);margin-top:3px}

/* ── 할일 카드 ── */
.task-card{background:var(--bg);border:0.5px solid var(--border);border-left:3px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;flex-direction:column;gap:8px;transition:border-color .15s,box-shadow .15s}
.task-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.task-card.priority-high{border-left-color:#E24B4A}
.task-card.priority-mid{border-left-color:#EF9F27}
.task-card.priority-low{border-left-color:var(--accent)}
.task-card.done-card{border-left-color:var(--border);opacity:.65}

.card-top{display:flex;align-items:flex-start;gap:10px}
.card-checks{display:flex;flex-direction:column;gap:5px;flex-shrink:0;padding-top:2px}
.cb-wrap{display:flex;align-items:center;gap:5px}
.cb{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;background:var(--bg)}
.cb:hover{border-color:var(--accent)}
.cb.c-done{background:var(--accent);border-color:var(--accent);color:#fff}
.cb.c-approve{background:var(--blue);border-color:var(--blue);color:#fff}
.cb i{font-size:10px}
.cb-label{font-size:11px;color:var(--text3)}

.card-body{flex:1;min-width:0}
.card-title{font-size:14px;font-weight:500;color:var(--text);line-height:1.4;cursor:pointer}
.card-title:hover{color:var(--accent)}
.done-card .card-title{text-decoration:line-through;color:var(--text3);cursor:default}
.card-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:5px}
.meta-item{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text2)}
.meta-item i{font-size:13px}
.meta-overdue{color:#E24B4A;font-weight:500}
.meta-today{color:var(--amber);font-weight:500}

.priority-pill{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px}
.p-high{background:var(--red-bg);color:var(--red)}
.p-mid{background:var(--amber-bg);color:var(--amber)}
.p-low{background:var(--accent-bg);color:var(--accent-dark)}

.card-remark{font-size:12px;color:var(--text2);background:var(--bg2);border-radius:6px;padding:7px 10px;line-height:1.6;border-left:2px solid var(--border2)}

.btn-icon{background:none;border:0.5px solid var(--border);border-radius:6px;padding:5px 8px;cursor:pointer;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:4px;transition:background .15s}
.btn-icon:hover{background:var(--bg2)}

/* 결재완료 스탬프 */
.done-stamp{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--blue);background:var(--blue-bg);border-radius:6px;padding:4px 10px;margin-top:4px}

/* ── 메모장 ── */
.memo-toolbar{display:flex;align-items:center;gap:8px}
.memo-back{background:none;border:none;cursor:pointer;font-size:13px;color:var(--text2);display:flex;align-items:center;gap:4px;padding:4px 2px;flex-shrink:0}
.memo-back:hover{color:var(--text)}
.memo-back i{font-size:15px}
.memo-title-input{flex:1;font-size:14px;font-weight:500;padding:7px 10px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--bg2);color:var(--text)}
.memo-title-input:focus{outline:none;border-color:var(--accent)}
.btn-memo-save{padding:7px 14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap}
.btn-memo-save:hover{opacity:.85}
.memo-body{width:100%;min-height:360px;padding:14px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--bg2);color:var(--text);font-size:13px;line-height:1.8;resize:vertical;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif}
.memo-body:focus{outline:none;border-color:var(--accent)}
.memo-list{display:flex;flex-direction:column;gap:8px}
.memo-item{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:13px 16px;cursor:pointer;transition:background .15s,border-color .15s}
.memo-item:hover{background:var(--bg2);border-color:var(--border2)}
.memo-item-title{font-size:13px;font-weight:500;color:var(--text)}
.memo-item-preview{font-size:12px;color:var(--text2);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.memo-item-date{font-size:11px;color:var(--text3);margin-top:6px;display:flex;align-items:center;gap:4px}

/* ── 빈 상태 ── */
.empty{text-align:center;padding:48px 24px;color:var(--text3);font-size:13px;line-height:1.8}
.empty i{font-size:32px;display:block;margin-bottom:10px;color:var(--text3)}

/* ── 모달 ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg);border-radius:var(--radius-lg);border:0.5px solid var(--border);padding:24px;width:440px;max-width:calc(100vw - 32px);display:flex;flex-direction:column;gap:14px;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.modal h2{font-size:15px;font-weight:600;color:var(--text)}
.field label{font-size:12px;color:var(--text2);display:block;margin-bottom:5px;font-weight:500}
.field input,.field textarea,.field select{width:100%;font-size:13px;padding:8px 10px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--bg2);color:var(--text);font-family:inherit}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--accent)}
.field textarea{resize:vertical;min-height:72px;line-height:1.6}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.check-row{display:flex;align-items:center;gap:8px;cursor:pointer}
.check-row input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--accent)}
.check-row label{font-size:13px;color:var(--text);cursor:pointer}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;padding-top:2px;border-top:0.5px solid var(--border)}
.btn-cancel{padding:7px 16px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);font-size:13px;cursor:pointer;color:var(--text);font-family:inherit}
.btn-cancel:hover{background:var(--bg3)}
.btn-save{padding:7px 16px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-save:hover{opacity:.88}
.btn-danger{padding:7px 14px;background:var(--red-bg);color:var(--red);border:0.5px solid var(--red-border);border-radius:var(--radius);font-size:13px;cursor:pointer;margin-right:auto;display:flex;align-items:center;gap:5px;font-family:inherit}
.btn-danger:hover{opacity:.85}

/* 스크롤바 */
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-track{background:transparent}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
</style>
</head>
<body>

<div class="app">
  <!-- 사이드바 -->
  <aside class="sidebar">
    <div class="app-logo">
      <i class="ti ti-briefcase"></i>
      <span>업무 도구</span>
    </div>

    <div class="sidebar-title">메뉴</div>
    <div class="nav-item active" id="nav-todo" onclick="switchView('todo')">
      <i class="ti ti-list-check"></i> 할일 목록
      <span class="badge badge-todo" id="badge-todo">0</span>
    </div>
    <div class="nav-item" id="nav-done" onclick="switchView('done')">
      <i class="ti ti-circle-check"></i> 결재완료
      <span class="badge badge-done" id="badge-done">0</span>
    </div>
    <div class="nav-item" id="nav-journal" onclick="switchView('journal')">
      <i class="ti ti-notebook"></i> 업무일지
    </div>
    <div class="nav-item" id="nav-memo" onclick="switchView('memo')">
      <i class="ti ti-pencil"></i> 메모장
    </div>

    <div class="sidebar-footer">
      완료 + 결재 모두 체크 시<br>결재완료로 자동 이동됩니다
    </div>
  </aside>

  <!-- 메인 -->
  <main class="main">
    <div class="topbar">
      <h1 id="view-title">할일 목록</h1>
      <span class="date-badge" id="today-date"></span>
      <button class="btn-add" id="btn-main-add" onclick="openModal()">
        <i class="ti ti-plus"></i> 추가
      </button>
    </div>
    <div class="content" id="main-content"></div>
  </main>
</div>

<!-- 할일 추가/수정 모달 -->
<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal">
    <h2 id="modal-title">새 할일 추가</h2>

    <div class="field">
      <label>제목 *</label>
      <input id="f-title" placeholder="업무 내용을 입력하세요" />
    </div>

    <div class="row2">
      <div class="field">
        <label>우선순위</label>
        <select id="f-priority">
          <option value="high">🔴 높음 (긴급)</option>
          <option value="mid" selected>🟡 보통</option>
          <option value="low">🟢 낮음</option>
        </select>
      </div>
      <div class="field">
        <label>마감일</label>
        <input type="date" id="f-due" />
      </div>
    </div>

    <div class="field">
      <label>담당자</label>
      <input id="f-person" placeholder="담당자 이름" />
    </div>

    <div class="field">
      <label>비고</label>
      <textarea id="f-remark" placeholder="참고사항, 메모 등..."></textarea>
    </div>

    <div class="row2">
      <div class="check-row">
        <input type="checkbox" id="f-done-cb" />
        <label for="f-done-cb">완료</label>
      </div>
      <div class="check-row">
        <input type="checkbox" id="f-approve-cb" />
        <label for="f-approve-cb">결재완료</label>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-danger" id="btn-delete" onclick="deleteItem()" style="display:none">
        <i class="ti ti-trash" style="font-size:13px"></i> 삭제
      </button>
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveItem()">저장</button>
    </div>
  </div>
</div>

<script>
// ── 유틸 ──────────────────────────────────────────────
const todayStr = () => new Date().toISOString().slice(0, 10);
const nowStr = () => {
  const d = new Date();
  return d.toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' })
    + ' ' + d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
};

// ── 데이터 ────────────────────────────────────────────
let tasks = [
  { id:1, title:"3분기 업무계획서 작성",  priority:"high", due:"2026-05-22", person:"김철수", done:false, approved:false, remark:"팀장 검토 필요",     date:todayStr(), completedAt:null },
  { id:2, title:"민원처리 현황 보고",      priority:"mid",  due:"2026-05-20", person:"이영희", done:true,  approved:true,  remark:"",                    date:todayStr(), completedAt:"2026. 05. 19. 오전 10:32" },
  { id:3, title:"부서 예산 검토",          priority:"high", due:"2026-05-21", person:"박민준", done:false, approved:false, remark:"전년도 비교 포함",     date:todayStr(), completedAt:null },
  { id:4, title:"신규 직원 온보딩 자료 준비", priority:"low", due:"2026-05-28", person:"최수진", done:false, approved:false, remark:"",                  date:todayStr(), completedAt:null },
  { id:5, title:"주간 회의 준비",          priority:"mid",  due:"2026-05-19", person:"김철수", done:true,  approved:false, remark:"자료 취합 필요",       date:todayStr(), completedAt:null },
];
let nextId = 6;

let memos = [];
let memoNextId = 1;
let memoView = 'list';    // 'list' | 'edit'
let memoEditingId = null;

let view = 'todo';
let editingId = null;

// ── 초기화 ────────────────────────────────────────────
document.getElementById('today-date').textContent =
  new Date().toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'short' });

// ── 뷰 전환 ───────────────────────────────────────────
function switchView(v) {
  view = v;
  ['todo','done','journal','memo'].forEach(k => {
    document.getElementById('nav-' + k)?.classList.toggle('active', k === v);
  });
  const titles = { todo:'할일 목록', done:'결재완료', journal:'업무일지', memo:'메모장' };
  document.getElementById('view-title').textContent = titles[v];

  const addBtn = document.getElementById('btn-main-add');
  if (v === 'memo') {
    addBtn.style.display = 'flex';
    addBtn.onclick = newMemo;
  } else if (v === 'done') {
    addBtn.style.display = 'none';
  } else {
    addBtn.style.display = 'flex';
    addBtn.onclick = openModal;
  }
  render();
}

// ── 렌더 ──────────────────────────────────────────────
function render() {
  updateBadges();
  const el = document.getElementById('main-content');
  if (view === 'todo')    renderTodo(el);
  else if (view === 'done')    renderDone(el);
  else if (view === 'journal') renderJournal(el);
  else                         renderMemo(el);
}

function updateBadges() {
  document.getElementById('badge-todo').textContent = tasks.filter(t => !isFullDone(t)).length;
  document.getElementById('badge-done').textContent = tasks.filter(t =>  isFullDone(t)).length;
}

const isFullDone = t => t.done && t.approved;

// ── 할일 목록 ─────────────────────────────────────────
function renderTodo(el) {
  const today = todayStr();
  const list = tasks.filter(t => !isFullDone(t)).sort((a, b) => {
    const po = { high:0, mid:1, low:2 };
    return po[a.priority] - po[b.priority];
  });

  const urgent  = list.filter(t => t.priority === 'high').length;
  const overdue = list.filter(t => t.due && t.due <= today).length;

  el.innerHTML = `
    <div class="summary-row">
      <div class="stat"><div class="stat-n">${list.length}</div><div class="stat-l">진행중 할일</div></div>
      <div class="stat"><div class="stat-n">${urgent}</div><div class="stat-l">🔴 긴급</div></div>
      <div class="stat"><div class="stat-n">${overdue}</div><div class="stat-l">⏰ 마감 도래</div></div>
    </div>
    <div class="section-label">할일 목록</div>
    ${list.length === 0
      ? '<div class="empty"><i class="ti ti-confetti"></i>모든 할일이 완료되었습니다!</div>'
      : list.map(t => taskCardHTML(t, today)).join('')}
  `;
}

// ── 결재완료 ──────────────────────────────────────────
function renderDone(el) {
  const list = tasks.filter(t => isFullDone(t))
    .sort((a, b) => (b.completedAt || '').localeCompare(a.completedAt || ''));

  el.innerHTML = `
    <div class="section-label">결재완료 항목 (${list.length}건)</div>
    ${list.length === 0
      ? '<div class="empty"><i class="ti ti-check-circle"></i>결재완료 항목이 없습니다</div>'
      : list.map(t => `
        <div class="task-card done-card" style="border-left-color:var(--blue);opacity:1">
          <div class="card-top">
            <div class="card-checks">
              <div class="cb-wrap">
                <div class="cb c-done" onclick="toggleDone(${t.id})" title="완료 해제">
                  <i class="ti ti-check"></i>
                </div>
                <span class="cb-label">완료</span>
              </div>
              <div class="cb-wrap">
                <div class="cb c-approve" onclick="toggleApprove(${t.id})" title="결재 해제">
                  <i class="ti ti-check"></i>
                </div>
                <span class="cb-label">결재</span>
              </div>
            </div>
            <div class="card-body">
              <div class="card-title">${t.title}</div>
              <div class="card-meta">
                ${t.due    ? `<span class="meta-item"><i class="ti ti-calendar"></i>${t.due}</span>` : ''}
                ${t.person ? `<span class="meta-item"><i class="ti ti-user"></i>${t.person}</span>`  : ''}
              </div>
              ${t.completedAt
                ? `<div class="done-stamp"><i class="ti ti-clock" style="font-size:12px"></i>결재완료: ${t.completedAt}</div>`
                : ''}
            </div>
          </div>
          ${t.remark ? `<div class="card-remark">${t.remark}</div>` : ''}
        </div>`).join('')}
  `;
}

// ── 업무일지 ──────────────────────────────────────────
function renderJournal(el) {
  const today = todayStr();
  const grouped = {};
  tasks.forEach(t => {
    const d = t.date || '미분류';
    if (!grouped[d]) grouped[d] = [];
    grouped[d].push(t);
  });
  const dates = Object.keys(grouped).sort((a, b) => b.localeCompare(a));
  el.innerHTML = dates.map(d => `
    <div class="section-label">${d === today ? '오늘 — ' + d : d}</div>
    ${grouped[d].map(t => taskCardHTML(t, today)).join('')}
  `).join('') || '<div class="empty"><i class="ti ti-notebook"></i>업무일지가 없습니다</div>';
}

// ── 카드 HTML ─────────────────────────────────────────
function taskCardHTML(t, today) {
  const isOverdue = t.due && t.due < today;
  const isDueToday = t.due && t.due === today;
  return `
  <div class="task-card priority-${t.priority}${isFullDone(t) ? ' done-card' : ''}">
    <div class="card-top">
      <div class="card-checks">
        <div class="cb-wrap">
          <div class="cb${t.done ? ' c-done' : ''}" onclick="toggleDone(${t.id})" title="완료 체크">
            ${t.done ? '<i class="ti ti-check"></i>' : ''}
          </div>
          <span class="cb-label">완료</span>
        </div>
        <div class="cb-wrap">
          <div class="cb${t.approved ? ' c-approve' : ''}" onclick="toggleApprove(${t.id})" title="결재 체크">
            ${t.approved ? '<i class="ti ti-check"></i>' : ''}
          </div>
          <span class="cb-label">결재</span>
        </div>
      </div>
      <div class="card-body">
        <div class="card-title" onclick="editItem(${t.id})">${t.title}</div>
        <div class="card-meta">
          <span class="priority-pill p-${t.priority}">
            ${t.priority === 'high' ? '긴급' : t.priority === 'mid' ? '보통' : '낮음'}
          </span>
          ${t.due ? `<span class="meta-item ${isOverdue ? 'meta-overdue' : isDueToday ? 'meta-today' : ''}">
            <i class="ti ti-calendar"></i>${isOverdue ? '⚠ 기한초과 ' : isDueToday ? '오늘 마감 ' : ''}${t.due}
          </span>` : ''}
          ${t.person ? `<span class="meta-item"><i class="ti ti-user"></i>${t.person}</span>` : ''}
        </div>
      </div>
      <div>
        <button class="btn-icon" onclick="editItem(${t.id})" title="수정">
          <i class="ti ti-edit"></i>
        </button>
      </div>
    </div>
    ${t.remark ? `<div class="card-remark"><i class="ti ti-note" style="font-size:12px;margin-right:4px"></i>${t.remark}</div>` : ''}
  </div>`;
}

// ── 토글 ──────────────────────────────────────────────
function toggleDone(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t.done = !t.done;
  checkCompletion(t);
  render();
}
function toggleApprove(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t.approved = !t.approved;
  checkCompletion(t);
  render();
}
function checkCompletion(t) {
  if (t.done && t.approved && !t.completedAt) t.completedAt = nowStr();
  else if (!t.done || !t.approved)            t.completedAt = null;
}

// ── 모달 ──────────────────────────────────────────────
function openModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = '새 할일 추가';
  document.getElementById('f-title').value     = '';
  document.getElementById('f-priority').value  = 'mid';
  document.getElementById('f-due').value        = '';
  document.getElementById('f-person').value     = '';
  document.getElementById('f-remark').value     = '';
  document.getElementById('f-done-cb').checked    = false;
  document.getElementById('f-approve-cb').checked = false;
  document.getElementById('btn-delete').style.display = 'none';
  document.getElementById('modal').classList.add('open');
}
function editItem(id) {
  editingId = id;
  const t = tasks.find(x => x.id === id);
  document.getElementById('modal-title').textContent   = '항목 수정';
  document.getElementById('f-title').value     = t.title;
  document.getElementById('f-priority').value  = t.priority;
  document.getElementById('f-due').value        = t.due    || '';
  document.getElementById('f-person').value     = t.person || '';
  document.getElementById('f-remark').value     = t.remark || '';
  document.getElementById('f-done-cb').checked    = t.done;
  document.getElementById('f-approve-cb').checked = t.approved;
  document.getElementById('btn-delete').style.display = 'block';
  document.getElementById('modal').classList.add('open');
}
function closeModal()             { document.getElementById('modal').classList.remove('open'); editingId = null; }
function closeModalOutside(e)     { if (e.target.id === 'modal') closeModal(); }

function saveItem() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('제목을 입력해주세요'); return; }
  const data = {
    title,
    priority : document.getElementById('f-priority').value,
    due      : document.getElementById('f-due').value,
    person   : document.getElementById('f-person').value.trim(),
    remark   : document.getElementById('f-remark').value.trim(),
    done     : document.getElementById('f-done-cb').checked,
    approved : document.getElementById('f-approve-cb').checked,
  };
  if (editingId) {
    const idx = tasks.findIndex(t => t.id === editingId);
    tasks[idx] = { ...tasks[idx], ...data };
    checkCompletion(tasks[idx]);
  } else {
    const t = { id: nextId++, ...data, date: todayStr(), completedAt: null };
    checkCompletion(t);
    tasks.push(t);
  }
  closeModal();
  render();
}
function deleteItem() {
  if (!editingId) return;
  if (!confirm('이 항목을 삭제할까요?')) return;
  tasks = tasks.filter(t => t.id !== editingId);
  closeModal();
  render();
}

// ── 메모장 ────────────────────────────────────────────
function renderMemo(el) {
  if (memoView === 'edit') {
    const m = memoEditingId !== null ? memos.find(x => x.id === memoEditingId) : null;
    el.innerHTML = `
      <div class="memo-toolbar">
        <button class="memo-back" onclick="memoBack()">
          <i class="ti ti-arrow-left"></i> 목록
        </button>
        <input class="memo-title-input" id="memo-title-inp" placeholder="메모 제목" value="${m ? escHtml(m.title) : ''}" />
        <button class="btn-memo-save" onclick="saveMemo()">저장</button>
        ${m ? `<button class="btn-icon" onclick="deleteMemo(${m.id})"
                style="color:var(--red);border-color:var(--red-border)" title="삭제">
                <i class="ti ti-trash"></i></button>` : ''}
      </div>
      <textarea class="memo-body" id="memo-body-inp"
        placeholder="여기에 자유롭게 메모를 입력하세요...">${m ? escHtml(m.body) : ''}</textarea>
    `;
    return;
  }

  el.innerHTML = `
    <div class="section-label">메모 목록 (${memos.length}개)</div>
    <div class="memo-list">
      ${memos.length === 0
        ? `<div class="empty"><i class="ti ti-pencil"></i>메모가 없습니다<br>
           <small style="font-size:12px">상단 추가 버튼을 눌러 첫 메모를 작성하세요</small></div>`
        : memos.map(m => `
          <div class="memo-item" onclick="openMemoEdit(${m.id})">
            <div class="memo-item-title">${escHtml(m.title) || '(제목 없음)'}</div>
            <div class="memo-item-preview">${escHtml(m.body).replace(/\n/g,' ') || '내용 없음'}</div>
            <div class="memo-item-date"><i class="ti ti-clock"></i> ${m.updatedAt}</div>
          </div>`).join('')}
    </div>
  `;
}

function newMemo()          { memoEditingId = null; memoView = 'edit'; render(); }
function openMemoEdit(id)   { memoEditingId = id;   memoView = 'edit'; render(); }
function memoBack()         { memoView = 'list'; render(); }

function saveMemo() {
  const title = document.getElementById('memo-title-inp').value.trim();
  const body  = document.getElementById('memo-body-inp').value;
  const now   = nowStr();
  if (memoEditingId !== null) {
    const m = memos.find(x => x.id === memoEditingId);
    if (m) { m.title = title; m.body = body; m.updatedAt = now; }
  } else {
    memos.unshift({ id: memoNextId++, title, body, updatedAt: now });
  }
  memoView = 'list';
  render();
}
function deleteMemo(id) {
  if (!confirm('이 메모를 삭제할까요?')) return;
  memos = memos.filter(m => m.id !== id);
  memoView = 'list';
  render();
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── 시작 ──────────────────────────────────────────────
render();
</script>
</body>
</html>
