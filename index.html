<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>광양시청소년문화센터 도구 모음</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    background: #f5f5f3;
    color: #1a1a1a;
    min-height: 100vh;
  }

  /* ── 상단 헤더 ── */
  .top-bar {
    background: #1a1a1a;
    height: 4px;
  }
  .header-wrap {
    max-width: 860px;
    margin: 0 auto;
    padding: 48px 24px 0;
  }
  .org-name {
    font-size: 13px;
    color: #888780;
    margin-bottom: 8px;
  }
  .page-title {
    font-size: 28px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 8px;
    letter-spacing: -.02em;
  }
  .page-desc {
    font-size: 14px;
    color: #5f5e5a;
    margin-bottom: 40px;
  }
  .divider {
    border: none;
    border-top: 1px solid #e0ddd6;
    margin-bottom: 36px;
  }

  /* ── 섹션 ── */
  .section-wrap {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 24px 48px;
  }
  .section-label {
    font-size: 12px;
    font-weight: 600;
    color: #888780;
    letter-spacing: .06em;
    margin-bottom: 16px;
  }

  /* ── 카드 그리드 ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 40px;
  }

  /* 세로형 카드 — 기존 사이트 스타일 */
  .card {
    background: #ffffff;
    border: 1px solid #e0ddd6;
    border-radius: 14px;
    padding: 22px 20px 18px;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 0;
    transition: box-shadow .18s, border-color .18s, transform .15s;
    cursor: pointer;
  }
  .card:hover {
    box-shadow: 0 6px 20px rgba(0,0,0,.09);
    border-color: #c8c5be;
    transform: translateY(-2px);
  }

  .card-icon-wrap {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    background: #f0ede6;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    margin-bottom: 14px;
  }
  .card-icon-wrap.blue { background: #E6F1FB; }
  .card-icon-wrap.green { background: #E1F5EE; }

  .card-title {
    font-size: 15px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 6px;
    line-height: 1.3;
  }
  .card-desc {
    font-size: 12px;
    color: #888780;
    line-height: 1.55;
    margin-bottom: 14px;
    flex: 1;
  }
  .card-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 20px;
    background: #f0ede6;
    color: #5f5e5a;
    width: fit-content;
  }
  .card-tag.ai   { background: #E1F5EE; color: #0F6E56; }
  .card-tag.blue { background: #E6F1FB; color: #185FA5; }

  /* ── 푸터 ── */
  footer {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 24px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: #aaa9a4;
    border-top: 1px solid #e0ddd6;
    padding-top: 20px;
  }
</style>
</head>
<body>

<div class="top-bar"></div>

<div class="header-wrap">
  <p class="org-name">광양시청소년문화센터</p>
  <h1 class="page-title">업무 도구 모음</h1>
  <p class="page-desc">자주 사용하는 업무 도구들을 모아놓은 페이지입니다.</p>
  <hr class="divider" />
</div>

<div class="section-wrap">

  <div class="section-label">문서 작성</div>
  <div class="grid">
    <a class="card" href="https://chc4380-alt.github.io/youth-app/" target="_blank">
      <div class="card-icon-wrap"><span>📝</span></div>
      <div class="card-title">기안 자동작성기</div>
      <div class="card-desc">AI를 활용한 공문 기안문 자동 작성 도구</div>
      <span class="card-tag ai">AI 도구</span>
    </a>
  </div>

  <div class="section-label">업무 관리</div>
  <div class="grid">
    <a class="card" href="./할일목록/" target="_blank">
      <div class="card-icon-wrap blue"><span>✅</span></div>
      <div class="card-title">할일 목록 &amp; 메모장</div>
      <div class="card-desc">할일, 결재 현황, 업무일지, 메모를 한 곳에서 관리</div>
      <span class="card-tag blue">업무 도구</span>
    </a>
  </div>

</div>

<footer>
  <span>광양시청소년문화센터 내부 업무 도구</span>
  <span id="today"></span>
</footer>

<script>
  const d = new Date();
  document.getElementById('today').textContent =
    d.getFullYear() + '.' +
    String(d.getMonth()+1).padStart(2,'0') + '.' +
    String(d.getDate()).padStart(2,'0') + ' 기준';
</script>
</body>
</html>
