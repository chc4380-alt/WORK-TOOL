<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>광양시청소년문화센터 도구 모음</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F8F7F4;
    --surface: #FFFFFF;
    --border: rgba(0,0,0,0.08);
    --border-hover: rgba(0,0,0,0.18);
    --text: #1A1918;
    --text-muted: #6B6A66;
    --text-hint: #9B9A96;
    --accent: #185FA5;
    --accent-light: #E6F1FB;
    --radius: 12px;
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 48px 24px;
  }

  header {
    max-width: 720px;
    margin: 0 auto 48px;
  }

  header .org {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--text-hint);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  header h1 {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 8px;
  }

  header p {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .divider {
    max-width: 720px;
    margin: 0 auto 36px;
    height: 1px;
    background: var(--border);
  }

  .section-label {
    max-width: 720px;
    margin: 0 auto 16px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--text-hint);
    text-transform: uppercase;
  }

  .grid {
    max-width: 720px;
    margin: 0 auto 48px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
    cursor: pointer;
  }

  .card:hover {
    border-color: var(--border-hover);
    box-shadow: 0 4px 16px rgba(0,0,0,0.07);
    transform: translateY(-2px);
  }

  .card-icon {
    width: 36px;
    height: 36px;
    background: var(--accent-light);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .card-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
  }

  .card-desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .card-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--accent);
    background: var(--accent-light);
    border-radius: 4px;
    padding: 2px 7px;
    width: fit-content;
  }

  footer {
    max-width: 720px;
    margin: 0 auto;
    font-size: 12px;
    color: var(--text-hint);
    padding-top: 24px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
</style>
</head>
<body>

<header>
  <div class="org">광양시청소년문화센터</div>
  <h1>업무 도구 모음</h1>
  <p>자주 사용하는 업무 도구들을 모아놓은 페이지입니다.</p>
</header>

<div class="divider"></div>

<div class="section-label">문서 작성</div>
<div class="grid">

  <a class="card" href="https://chc4380-alt.github.io/youth-app/" target="_blank">
    <div class="card-icon">📝</div>
    <div class="card-title">기안 자동작성기</div>
    <div class="card-desc">AI를 활용한 공문 기안문 자동 작성 도구</div>
    <span class="card-tag">AI 도구</span>
  </a>

  <!-- 새 앱은 여기에 추가됩니다 -->

</div>

<footer>
  <span>광양시청소년문화센터 내부 업무 도구</span>
  <span id="updated"></span>
</footer>

<script>
  const d = new Date();
  document.getElementById('updated').textContent =
    `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} 기준`;
</script>

</body>
</html>
