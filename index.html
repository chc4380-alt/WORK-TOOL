<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>광양시청소년문화센터 도구 모음</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    background: #f5f5f3;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 16px 64px;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }
  .org-name {
    font-size: 13px;
    color: #888780;
    letter-spacing: .04em;
    margin-bottom: 10px;
  }
  header h1 {
    font-size: 26px;
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: -.02em;
    margin-bottom: 8px;
  }
  header p {
    font-size: 14px;
    color: #5f5e5a;
  }

  .section-label {
    width: 100%;
    max-width: 720px;
    font-size: 11px;
    font-weight: 600;
    color: #888780;
    text-transform: uppercase;
    letter-spacing: .1em;
    margin-bottom: 12px;
    padding-left: 2px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px;
    width: 100%;
    max-width: 720px;
    margin-bottom: 32px;
  }

  .card {
    background: #ffffff;
    border: 0.5px solid #d4d2c9;
    border-radius: 12px;
    padding: 20px 22px;
    text-decoration: none;
    color: inherit;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    transition: box-shadow .18s, border-color .18s, transform .15s;
  }
  .card:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,.10);
    border-color: #b0ada6;
    transform: translateY(-1px);
  }

  .card-icon {
    font-size: 28px;
    line-height: 1;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .card-body { flex: 1; min-width: 0; }
  .card-title {
    font-size: 15px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 5px;
    line-height: 1.3;
  }
  .card-desc {
    font-size: 13px;
    color: #5f5e5a;
    line-height: 1.5;
    margin-bottom: 8px;
  }
  .card-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 9px;
    border-radius: 20px;
    background: #E1F5EE;
    color: #0F6E56;
  }
  .card-tag.blue {
    background: #E6F1FB;
    color: #185FA5;
  }

  footer {
    margin-top: auto;
    font-size: 12px;
    color: #aaa9a4;
    text-align: center;
    padding-top: 24px;
  }
</style>
</head>
<body>

<header>
  <p class="org-name">광양시청소년문화센터</p>
  <h1>업무 도구 모음</h1>
  <p>자주 사용하는 업무 도구들을 모아놓은 페이지입니다.</p>
</header>

<div class="section-label">문서 작성</div>
<div class="grid">
  <a class="card" href="https://chc4380-alt.github.io/youth-app/" target="_blank">
    <div class="card-icon">📝</div>
    <div class="card-body">
      <div class="card-title">기안 자동작성기</div>
      <div class="card-desc">AI를 활용한 공문 기안문 자동 작성 도구</div>
      <span class="card-tag">AI 도구</span>
    </div>
  </a>
</div>

<div class="section-label">업무 관리</div>
<div class="grid">
  <a class="card" href="./할일목록/" target="_blank">
    <div class="card-icon">✅</div>
    <div class="card-body">
      <div class="card-title">할일 목록 & 메모장</div>
      <div class="card-desc">할일 목록, 결재 현황, 업무일지, 메모를 한 곳에서 관리</div>
      <span class="card-tag blue">업무 도구</span>
    </div>
  </a>
</div>

<footer>광양시청소년문화센터 내부 업무 도구</footer>

</body>
</html>
