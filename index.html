<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>광양시청소년문화센터 도구 모음</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;
  background:#f5f5f3;color:#1a1a1a;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:48px 16px 64px
}
header{text-align:center;margin-bottom:40px}
.org-name{font-size:13px;color:#888780;letter-spacing:.04em;margin-bottom:10px}
header h1{font-size:26px;font-weight:700;color:#1a1a1a;letter-spacing:-.02em;margin-bottom:8px}
header p{font-size:14px;color:#5f5e5a}

.section-label{
  width:100%;max-width:720px;font-size:11px;font-weight:600;color:#888780;
  text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;padding-left:2px
}
.grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:12px;width:100%;max-width:720px;margin-bottom:32px
}
.card{
  background:#fff;border:0.5px solid #d4d2c9;border-radius:14px;
  padding:22px 18px 18px;text-decoration:none;color:inherit;
  display:flex;flex-direction:column;align-items:flex-start;gap:10px;
  transition:box-shadow .18s,border-color .18s,transform .15s
}
.card:hover{box-shadow:0 4px 18px rgba(0,0,0,.10);border-color:#a0ada6;transform:translateY(-2px)}
.card-icon{
  width:44px;height:44px;border-radius:12px;display:flex;align-items:center;
  justify-content:center;font-size:22px;flex-shrink:0
}
.card-info{}
.card-title{font-size:14px;font-weight:700;margin-bottom:4px}
.card-desc{font-size:12px;color:#5f5e5a;line-height:1.5}

/* 아이콘 색상 */
.ic-blue{background:#eff6ff;color:#2563eb}
.ic-green{background:#f0fdf4;color:#16a34a}
.ic-purple{background:#faf5ff;color:#7c3aed}
.ic-orange{background:#fff7ed;color:#ea580c}
.ic-pink{background:#fdf2f8;color:#db2777}
.ic-teal{background:#f0fdfa;color:#0d9488}

footer{margin-top:16px;font-size:12px;color:#b0ada6;text-align:center}
</style>
</head>
<body>
<header>
  <div class="org-name">광양시청소년문화센터</div>
  <h1>업무 도구 모음</h1>
  <p>자주 쓰는 업무 도구를 모아놓은 내부 허브입니다</p>
</header>

<div class="section-label">📄 문서 작성</div>
<div class="grid">
  <a class="card" href="./기안자동작성기/">
    <div class="card-icon ic-blue"><i class="ti ti-file-text"></i></div>
    <div class="card-info">
      <div class="card-title">기안 자동작성기</div>
      <div class="card-desc">내용 입력 후 공문 기안문 자동 생성</div>
    </div>
  </a>
  <a class="card" href="./안내문작성기/">
    <div class="card-icon ic-teal"><i class="ti ti-speakerphone"></i></div>
    <div class="card-info">
      <div class="card-title">안내문 빠른 작성기</div>
      <div class="card-desc">템플릿으로 인쇄용 안내문 즉시 완성</div>
    </div>
  </a>
</div>

<div class="section-label">✅ 업무 관리</div>
<div class="grid">
  <a class="card" href="./할일목록/">
    <div class="card-icon ic-green"><i class="ti ti-checklist"></i></div>
    <div class="card-info">
      <div class="card-title">할일 목록 · 업무일지</div>
      <div class="card-desc">할일 관리, 결재 체크, 메모 통합</div>
    </div>
  </a>
</div>

<div class="section-label">📊 통계 · 분석</div>
<div class="grid">
  <a class="card" href="./만족도조사/">
    <div class="card-icon ic-purple"><i class="ti ti-chart-bar"></i></div>
    <div class="card-info">
      <div class="card-title">만족도 조사 분석기</div>
      <div class="card-desc">문항 구성 → 응답 입력 → 자동 분석</div>
    </div>
  </a>
</div>

<footer>광양시청소년문화센터 내부용 · 문의: 담당자</footer>
</body>
</html>
