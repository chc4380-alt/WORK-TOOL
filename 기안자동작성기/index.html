<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기안 자동작성기 — 광양시청소년문화센터</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --surface2: #F1EFE8;
    --border: rgba(0,0,0,0.10);
    --border-strong: rgba(0,0,0,0.18);
    --text: #1A1918;
    --text-muted: #6B6A66;
    --text-hint: #9B9A96;
    --accent: #185FA5;
    --accent-bg: #E6F1FB;
    --accent-border: #85B7EB;
    --success: #3B6D11;
    --success-bg: #EAF3DE;
    --danger: #A32D2D;
    --danger-bg: #FCEBEB;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    align-items: center;
    gap: 12px;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 14px; font-weight: 700;
  }
  .header-title { font-size: 15px; font-weight: 600; }
  .header-sub { font-size: 13px; color: var(--text-muted); margin-left: 4px; }

  /* LAYOUT */
  .layout {
    display: grid;
    grid-template-columns: 380px 1fr;
    min-height: calc(100vh - 56px);
  }

  /* SIDEBAR */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 20px;
    overflow-y: auto;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--text-hint);
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .form-group {
    margin-bottom: 14px;
  }
  .form-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 5px;
    display: block;
  }
  .form-label .required { color: var(--danger); margin-left: 2px; }

  input[type="text"],
  input[type="date"],
  input[type="number"],
  input[type="time"],
  textarea,
  select {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-family: inherit;
    color: var(--text);
    background: var(--surface);
    transition: border-color 0.15s;
    outline: none;
  }
  input:focus, textarea:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(24,95,165,0.1);
  }
  textarea { resize: vertical; min-height: 64px; }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }

  .schedule-item {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 10px;
    margin-bottom: 8px;
    position: relative;
  }
  .schedule-item .del-btn {
    position: absolute; top: 8px; right: 8px;
    background: none; border: none; cursor: pointer;
    color: var(--text-hint); font-size: 16px; line-height: 1;
    padding: 2px 5px; border-radius: 4px;
  }
  .schedule-item .del-btn:hover { background: var(--danger-bg); color: var(--danger); }

  .add-btn {
    width: 100%;
    padding: 8px;
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius-sm);
    background: none;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .add-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  .generate-btn {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .generate-btn:hover { opacity: 0.88; }
  .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* MAIN AREA */
  .main {
    padding: 28px 32px;
    overflow-y: auto;
  }

  .preview-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .preview-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .preview-header-left { display: flex; align-items: center; gap: 10px; }
  .preview-title { font-size: 14px; font-weight: 600; }

  .status-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.02em;
  }
  .status-ready { background: var(--success-bg); color: var(--success); }
  .status-generating { background: var(--accent-bg); color: var(--accent); }
  .status-waiting { background: var(--surface2); color: var(--text-muted); }

  .download-btn {
    padding: 7px 14px;
    background: var(--success-bg);
    color: var(--success);
    border: 1px solid rgba(59,109,17,0.2);
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    display: flex; align-items: center; gap: 6px;
    transition: opacity 0.15s;
  }
  .download-btn:hover { opacity: 0.8; }
  .download-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* DOC PREVIEW */
  .preview-body { padding: 24px 32px; }

  .doc-preview {
    font-family: '함초롬바탕', 'Batang', 'UnBatang', serif;
    font-size: 13px;
    line-height: 1.8;
    color: #1a1a1a;
    max-width: 680px;
    margin: 0 auto;
  }
  .doc-title {
    text-align: center;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 20px;
    letter-spacing: 0.2em;
  }
  .doc-meta-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 16px;
    font-size: 12px;
  }
  .doc-meta-table td {
    border: 1px solid #888;
    padding: 5px 8px;
  }
  .doc-meta-label { background: #f5f5f5; font-weight: 600; width: 80px; }

  .doc-section-title {
    font-size: 13px;
    font-weight: 700;
    margin: 20px 0 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .doc-section-num {
    background: var(--text);
    color: white;
    width: 20px; height: 20px;
    border-radius: 50%;
    font-size: 11px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .doc-p { margin-bottom: 4px; }
  .doc-sub { padding-left: 20px; }
  .doc-indent { padding-left: 40px; }

  .ai-content {
    background: #fffef0;
    border-left: 3px solid #d4a017;
    padding: 10px 14px;
    border-radius: 0 6px 6px 0;
    margin: 4px 0 8px;
    font-size: 12.5px;
    line-height: 1.9;
  }

  .placeholder-text {
    color: var(--text-hint);
    font-style: italic;
  }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .stream-cursor {
    display: inline-block;
    width: 2px; height: 14px;
    background: var(--accent);
    animation: blink 0.8s step-end infinite;
    vertical-align: middle;
    margin-left: 2px;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-hint);
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-title { font-size: 16px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
  .empty-desc { font-size: 13px; }

  .error-box {
    background: var(--danger-bg);
    border: 1px solid rgba(163,45,45,0.2);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    color: var(--danger);
    font-size: 13px;
    margin-top: 12px;
  }

  .hint { font-size: 11px; color: var(--text-hint); margin-top: 4px; }

  .api-key-notice {
    background: var(--accent-bg);
    border: 1px solid var(--accent-border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 14px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">기</div>
  <span class="header-title">기안 자동작성기</span>
  <span class="header-sub">광양시청소년문화센터</span>
</div>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="api-key-notice">
      💡 Claude API를 통해 운영목적·목표·기대효과를 자동으로 작성해드립니다.
    </div>

    <!-- API KEY -->
    <div class="section-label">API 설정</div>
    <div class="form-group">
      <label class="form-label">Claude API Key <span class="required">*</span></label>
      <div style="display:flex;gap:6px;align-items:center;">
        <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off" style="flex:1;" oninput="checkAdminKey(this.value)">
        <button onclick="toggleApiKeyVisibility()" id="toggleBtn" title="키 보기/숨기기"
          style="padding:7px 10px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);background:var(--surface2);cursor:pointer;font-size:14px;flex-shrink:0;">👁</button>
        <button onclick="copyApiKey()" title="복사"
          style="padding:7px 10px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);background:var(--surface2);cursor:pointer;font-size:14px;flex-shrink:0;">📋</button>
      </div>
      <div style="display:flex;gap:6px;margin-top:6px;">
        <button onclick="saveApiKey()"
          style="flex:1;padding:6px;border:1px solid var(--accent-border);border-radius:var(--radius-sm);background:var(--accent-bg);color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">💾 저장</button>
        <button onclick="clearApiKey()"
          style="flex:1;padding:6px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text-muted);font-size:12px;cursor:pointer;font-family:inherit;">🗑 초기화</button>
      </div>
      <div class="hint" id="apiKeyHint">브라우저에 저장되며 외부로 전송되지 않습니다.</div>
    </div>

    <!-- 사용 내역: 관리자 키 입력 시에만 표시됨 (일반 사용자에게 숨김) -->
    <div id="adminPanel" style="display:none;">
      <button onclick="toggleUsageLog()"
        style="width:100%;padding:8px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text-muted);font-size:13px;cursor:pointer;font-family:inherit;margin-bottom:4px;">
        📊 사용 내역 보기
      </button>
      <div id="usageLog" style="display:none;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;margin-bottom:8px;max-height:220px;overflow-y:auto;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <span style="font-size:12px;font-weight:600;color:var(--text-muted);">작성 내역</span>
          <button onclick="clearUsageLog()" style="font-size:11px;color:var(--danger);background:none;border:none;cursor:pointer;">전체 삭제</button>
        </div>
        <div id="usageLogList"><span style="font-size:12px;color:var(--text-hint);">아직 작성 내역이 없습니다.</span></div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- 기본 정보 -->
    <div class="section-label">기본 정보</div>

    <div class="form-group">
      <label class="form-label">분류번호 <span class="required">*</span></label>
      <input type="text" id="docNum" placeholder="기록 26 – 13" value="기록 26 – 13">
    </div>

    <div class="form-group">
      <label class="form-label">기안일시 <span class="required">*</span></label>
      <input type="date" id="docDate" value="2026-05-19">
    </div>

    <div class="form-group">
      <label class="form-label">기안자</label>
      <input type="text" id="author" value="최 희 철">
    </div>

    <div class="divider"></div>

    <!-- 활동 정보 -->
    <div class="section-label">활동 정보</div>

    <div class="form-group">
      <label class="form-label">활동명 <span class="required">*</span></label>
      <input type="text" id="actName" placeholder="청소년동아리 기록 5기 ○○○ 활동">
    </div>

    <div class="form-group">
      <label class="form-label">활동 기수</label>
      <div class="row2">
        <input type="text" id="period" placeholder="기록 5기" value="기록 5기">
        <input type="text" id="participants" placeholder="27명" value="27명(남 11명, 여 16명)">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">활동 일시 <span class="required">*</span></label>
      <input type="text" id="actDate" placeholder="2026년 5월 24일(일) 10:00 ~ 17:00">
    </div>

    <div class="form-group">
      <label class="form-label">장소 <span class="required">*</span></label>
      <input type="text" id="actPlace" placeholder="광양시청소년문화센터 및 관내 일원">
    </div>

    <div class="form-group">
      <label class="form-label">활동 내용 요약 <span class="required">*</span></label>
      <textarea id="actSummary" placeholder="어떤 활동인지 간단히 설명해주세요. AI가 운영목적·목표·기대효과를 자동 작성합니다." rows="3"></textarea>
    </div>

    <div class="divider"></div>

    <!-- 예산 -->
    <div class="section-label">예산</div>
    <div id="budgetList"></div>
    <button class="add-btn" onclick="addBudget()">+ 예산 항목 추가</button>
    <div class="form-group" style="margin-top:10px">
      <label class="form-label">합계 금액 <span class="required">*</span></label>
      <input type="text" id="budgetTotal" placeholder="243,000" oninput="updateTotalKor()">
      <div class="hint" id="totalKorHint"></div>
    </div>

    <div class="divider"></div>

    <!-- 세부 일정 -->
    <div class="section-label">세부 일정</div>
    <div id="scheduleList"></div>
    <button class="add-btn" onclick="addSchedule()">+ 일정 추가</button>

    <div class="divider"></div>

    <!-- 붙임 -->
    <div class="section-label">붙임 서류</div>
    <div id="attachList"></div>
    <button class="add-btn" onclick="addAttach()">+ 붙임 추가</button>

    <div class="divider"></div>

    <button class="generate-btn" id="genBtn" onclick="generate()">
      <span id="genBtnIcon">✦</span>
      <span id="genBtnText">기안문 자동 작성</span>
    </button>

    <div id="errorBox" style="display:none" class="error-box"></div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="preview-card">
      <div class="preview-header">
        <div class="preview-header-left">
          <span class="preview-title">기안문 미리보기</span>
          <span class="status-badge status-waiting" id="statusBadge">대기 중</span>
        </div>
        <button class="download-btn" id="downloadBtn" onclick="downloadHWPX()" disabled>
          ⬇ HWPX 다운로드
        </button>
      </div>
      <div class="preview-body">
        <div id="previewArea">
          <div class="empty-state">
            <div class="empty-icon">📄</div>
            <div class="empty-title">왼쪽 양식을 작성한 뒤 생성 버튼을 눌러주세요</div>
            <div class="empty-desc">운영목적, 운영목표, 기대효과는 AI가 자동으로 작성합니다</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const HWPX_TEMPLATE_B64 = '';

let generatedData = null;

// ── API Key 관리 ──
function saveApiKey() {
  const val = document.getElementById('apiKey').value.trim();
  if (!val) { showHint('저장할 키를 입력해주세요.', 'red'); return; }
  localStorage.setItem('gwangyang_api_key', val);
  showHint('✅ 저장됐습니다.', 'green');
}
function clearApiKey() {
  if (!confirm('저장된 API Key를 삭제할까요?')) return;
  localStorage.removeItem('gwangyang_api_key');
  document.getElementById('apiKey').value = '';
  showHint('삭제됐습니다.', 'gray');
}
function toggleApiKeyVisibility() {
  const inp = document.getElementById('apiKey');
  const btn = document.getElementById('toggleBtn');
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}
function copyApiKey() {
  const val = document.getElementById('apiKey').value.trim();
  if (!val) { showHint('복사할 키가 없습니다.', 'red'); return; }
  navigator.clipboard.writeText(val).then(() => showHint('📋 복사됐습니다!', 'green'));
}
function showHint(msg, color) {
  const hint = document.getElementById('apiKeyHint');
  const colors = { green: 'var(--success)', red: 'var(--danger)', gray: 'var(--text-muted)' };
  hint.style.color = colors[color] || 'var(--text-hint)';
  hint.textContent = msg;
  setTimeout(() => {
    hint.style.color = '';
    hint.textContent = '브라우저에 저장되며 외부로 전송되지 않습니다.';
  }, 2500);
}

// ── 사용 내역 ──
function toggleUsageLog() {
  const log = document.getElementById('usageLog');
  log.style.display = log.style.display === 'none' ? 'block' : 'none';
  if (log.style.display === 'block') renderUsageLog();
}
function addUsageLog(actName) {
  const logs = JSON.parse(localStorage.getItem('gwangyang_usage_log') || '[]');
  const now = new Date();
  const dateStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  logs.unshift({ date: dateStr, actName });
  if (logs.length > 50) logs.pop();
  localStorage.setItem('gwangyang_usage_log', JSON.stringify(logs));
  renderUsageLog();
}
function renderUsageLog() {
  const logs = JSON.parse(localStorage.getItem('gwangyang_usage_log') || '[]');
  const container = document.getElementById('usageLogList');
  if (!logs.length) {
    container.innerHTML = '<span style="font-size:12px;color:var(--text-hint);">아직 작성 내역이 없습니다.</span>';
    return;
  }
  container.innerHTML = logs.map((l, i) => `
    <div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;">
      <span style="color:var(--text-hint);margin-right:8px;">${String(i+1).padStart(2,'0')}</span>
      <span style="font-weight:600;">${l.actName}</span><br>
      <span style="color:var(--text-hint);margin-left:20px;">${l.date}</span>
    </div>`).join('');
}
function clearUsageLog() {
  if (!confirm('사용 내역을 전부 삭제할까요?')) return;
  localStorage.removeItem('gwangyang_usage_log');
  renderUsageLog();
}

// ── 관리자 모드 ──
// API Key 입력란에서 관리자 시크릿 키 입력 시 관리자 패널 표시
const ADMIN_SECRET = 'admin-gwangyang-2026';
let adminMode = false;

function checkAdminKey(value) {
  if (value === ADMIN_SECRET) {
    adminMode = true;
    sessionStorage.setItem('admin_mode', 'true');
    document.getElementById('adminPanel').style.display = 'block';
    document.getElementById('apiKey').value = localStorage.getItem('gwangyang_api_key') || '';
    showHint('🔓 관리자 모드 활성화됨', 'green');
    renderUsageLog();
  } else if (adminMode && value !== ADMIN_SECRET) {
    // 관리자 키 아닌 값 입력하면 일반 모드로 전환 (API key로 사용)

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return `${d.getFullYear()}. ${d.getMonth()+1}. ${d.getDate()}.`;
}

function numToKorean(num) {
  const n = parseInt(num.toString().replace(/,/g, ''));
  if (isNaN(n)) return '';
  const units = ['', '만', '억'];
  const digits = ['', '일', '이', '삼', '사', '오', '육', '칠', '팔', '구'];
  const subUnits = ['', '십', '백', '천'];
  let result = '';
  let str = n.toString();
  const groups = [];
  while (str.length > 0) {
    groups.unshift(str.slice(-4));
    str = str.slice(0, -4);
  }
  groups.forEach((g, gi) => {
    const unitIdx = groups.length - 1 - gi;
    let sub = '';
    for (let i = 0; i < g.length; i++) {
      const d = parseInt(g[i]);
      const su = subUnits[g.length - 1 - i];
      if (d > 0) sub += (d === 1 && su ? '' : digits[d]) + su;
    }
    if (sub) result += sub + units[unitIdx];
  });
  return result || '영';
}

async function generate() {
  let apiKey = document.getElementById('apiKey').value.trim();
  // 관리자 시크릿 입력된 경우 저장된 실제 API 키 사용
  if (apiKey === ADMIN_SECRET) {
    apiKey = localStorage.getItem('gwangyang_api_key') || '';
  }
  const actName = document.getElementById('actName').value.trim();
  const actSummary = document.getElementById('actSummary').value.trim();
  const actDate = document.getElementById('actDate').value.trim();
  const actPlace = document.getElementById('actPlace').value.trim();

  if (!apiKey) { showError('Claude API Key를 입력해주세요.'); return; }
  if (!actName) { showError('활동명을 입력해주세요.'); return; }
  if (!actSummary) { showError('활동 내용 요약을 입력해주세요.'); return; }
  if (!actDate) { showError('활동 일시를 입력해주세요.'); return; }

  hideError();
  setGenerating(true);
  setBadge('generating', 'AI 작성 중...');
  document.getElementById('downloadBtn').disabled = true;

  const docNum = document.getElementById('docNum').value.trim();
  const docDate = formatDate(document.getElementById('docDate').value);
  const author = document.getElementById('author').value.trim();
  const period = document.getElementById('period').value.trim();
  const participants = document.getElementById('participants').value.trim();
  const budgets = getBudgets();
  const budgetTotal = document.getElementById('budgetTotal').value.trim();
  const schedules = getSchedules();
  const attaches = getAttaches();

  const totalAmountNum = budgetTotal.replace(/,/g, '');
  const korAmount = numToKorean(totalAmountNum);

  const prompt = `당신은 광양시청소년문화센터의 기안문 작성 전문가입니다.
아래 활동 정보를 바탕으로 기안문의 AI 작성 파트를 JSON으로 출력해주세요.

활동명: ${actName}
활동 내용 요약: ${actSummary}
일시: ${actDate}
장소: ${actPlace}
참여인원: ${participants}

다음 JSON 형식으로만 출력하세요 (다른 텍스트 없이):
{
  "mainBody": "❍ ~하오니 재가하여 주시기를 바랍니다. (한 문장)",
  "purposes": ["운영목적 항목1", "운영목적 항목2", "운영목적 항목3", "운영목적 항목4"],
  "goals": ["운영목표 항목1", "운영목표 항목2", "운영목표 항목3"],
  "scheduleMainItems": ["주요내용 항목1", "주요내용 항목2", "주요내용 항목3"],
  "effects": ["기대효과 항목1", "기대효과 항목2", "기대효과 항목3", "기대효과 항목4"]
}

규칙:
- 경어체(합니다/습니다체) 사용
- 청소년활동 공문서 스타일
- 각 항목은 "○ "로 시작하지 말고 내용만 작성
- 모든 항목 문장은 반드시 "~한다.", "~할 수 있다." 형태의 어미와 마침표로 끝낼 것 (절대 "~합니다", "~습니다" 사용 금지, 마침표 필수)
- mainBody는 "❍ 2026년 광양시청소년문화센터 ${actName}을 아래와 같이 진행하고자 하오니 재가하여 주시기를 바랍니다." 형태`;

  showPreviewShell({ docNum, docDate, author, period, participants, actName, actDate, actPlace, budgets, budgetTotal, korAmount, schedules, attaches });

  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 30000);

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      signal: controller.signal,
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    clearTimeout(timeout);

    const data = await resp.json();

    if (!resp.ok) {
      const msg = data?.error?.message || `API 오류 (${resp.status})`;
      throw new Error(msg);
    }

    const raw = data.content?.[0]?.text?.trim();
    if (!raw) throw new Error('API 응답이 비어있습니다.');

    const jsonStr = raw.replace(/```json|```/g, '').trim();
    const ai = JSON.parse(jsonStr);

    generatedData = { docNum, docDate, author, period, participants, actName, actDate, actPlace, budgets, budgetTotal, korAmount, schedules, attaches, ai };

    showPreviewFull(generatedData);
    setBadge('ready', '작성 완료');
    document.getElementById('downloadBtn').disabled = false;
    addUsageLog(actName);

  } catch(e) {
    if (e.name === 'AbortError') {
      showError('요청 시간이 초과됐습니다 (30초). API Key를 확인하거나 다시 시도해주세요.');
    } else {
      showError('오류: ' + e.message);
    }
    setBadge('waiting', '오류');
  } finally {
    setGenerating(false);
  }
}

  if (hasBudget) {

      // 표가 여러 개 있을 수 있으니 모두 찾아서 각각 처리
      const allMatchingTables = new Set();

      for (const t of allTs()) {

        function setRowData(rowElem, budget) {
          const rowTs = [...rowElem.getElementsByTagNameNS(HP, 't')];
          if (rowTs[0]) { rowTs[0].textContent = budget.category || '일반수용비'; removeLineSeg(rowTs[0]); }

          if (rowTs[2]) {

            rowTs[2].textContent = itemPrefix + (budget.calc || '');
            removeLineSeg(rowTs[2]);

        }

        // 첫 번째 예산은 기존 행에
        setRowData(row, d.budgets[0]);

        // 추가 예산이 있으면 행 복제
        if (d.budgets.length > 1) {
          // 1. 표 전체에서 가장 큰 id 찾아서 새 id 부여용
          let maxId = 0;
          const allDocElems = doc.getElementsByTagName('*');
          for (const el of allDocElems) {
            const idAttr = el.getAttribute('id');
            if (idAttr) {
              const n = parseInt(idAttr, 10);
              if (!isNaN(n) && n > maxId) maxId = n;
            }
          }
          let nextId = maxId + 1;

          // 2. 원본 행의 rowAddr 알아두기
          const origCellAddrs = [...row.getElementsByTagNameNS(HP, 'cellAddr')];
          const origRowAddr = origCellAddrs[0] ? parseInt(origCellAddrs[0].getAttribute('rowAddr')) : 1;

          // 3. 행 높이 알아두기 (셀 height)
          const origCellSz = row.getElementsByTagNameNS(HP, 'cellSz')[0];
          const origRowHeight = origCellSz ? parseInt(origCellSz.getAttribute('height')) : 0;

          const extraRows = d.budgets.length - 1;
          const allTrs = [...tbl.getElementsByTagNameNS(HP, 'tr')];
          const origRowIdx = allTrs.indexOf(row);
          for (let j = origRowIdx + 1; j < allTrs.length; j++) {

            for (const ca of laterCells) {
              const oldRA = parseInt(ca.getAttribute('rowAddr'));
              ca.setAttribute('rowAddr', String(oldRA + extraRows));

          }

          // 5. 각 추가 예산마다 행 복제 + 메타데이터 수정
          let insertAfter = row;

            const clonedDescs = [...clonedRow.getElementsByTagName('*')];

            const clonedCellAddrs = [...clonedRow.getElementsByTagNameNS(HP, 'cellAddr')];
            for (const ca of clonedCellAddrs) {

          const tblSz = tbl.getElementsByTagNameNS(HP, 'sz')[0];

  // XML 직렬화 (한컴오피스가 요구하는 XML 헤더 명시 추가)

  }

  // 모든 파일을 읽어서 새 ZIP을 처음부터 만든다
  // (mimetype을 반드시 첫번째 + STORED 상태로 만들기 위해)
  const fileEntries = [];
  const fileNames = Object.keys(zip.files);

  // mimetype부터 먼저
  if (zip.file('mimetype')) {
    const content = await zip.file('mimetype').async('uint8array');
    fileEntries.push({ name: 'mimetype', content, compression: 'STORE' });
  }

  // 나머지 파일들
  for (const name of fileNames) {
    if (name === 'mimetype') continue;
    const entry = zip.file(name);
    if (!entry) continue;  // 디렉토리 항목은 zip.file()로 null
    if (entry.dir) continue;  // 명시적 디렉토리도 제외

    let content;
    if (name === 'Contents/section0.xml') {
      content = newXml;  // 수정된 XML
    } else {
      content = await entry.async('uint8array');
    }
    fileEntries.push({ name, content, compression: 'DEFLATE' });
  }

  // 새 ZIP 생성
  const newZip = new JSZip();
  for (const entry of fileEntries) {
    newZip.file(entry.name, entry.content, {
      compression: entry.compression,
      compressionOptions: entry.compression === 'DEFLATE' ? { level: 6 } : undefined
    });
  }
  const blob = await newZip.generateAsync({
    type: 'blob',
    mimeType: 'application/hwp+zip'
    // 압축은 파일별로 이미 설정됨 (mimetype은 STORE, 나머지는 DEFLATE)

  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = d.actName + '_진행의건.hwpx'; a.click();
  URL.revokeObjectURL(url);
}


function setGenerating(on) {
  const btn = document.getElementById('genBtn');
  const icon = document.getElementById('genBtnIcon');
  const text = document.getElementById('genBtnText');
  btn.disabled = on;
  if (on) {
    icon.innerHTML = '<span class="spinner"></span>';
    text.textContent = 'AI 작성 중...';
  } else {
    icon.textContent = '✦';
    text.textContent = '기안문 자동 작성';
  }
}

function setBadge(type, text) {
  const badge = document.getElementById('statusBadge');
  badge.className = 'status-badge status-' + type;
  badge.textContent = text;
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.style.display = 'block';
  box.textContent = msg;
}
function hideError() {
  document.getElementById('errorBox').style.display = 'none';
}
